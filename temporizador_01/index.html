<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador de 24s</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">
    <style>
        :root {
            --device-bg: #82dede;
            --display-bg: #0b0b0b;
            --btn-red: #e63946;
            --btn-red-dark: #c1121f;
            --btn-blue: #2176ff;
            --btn-blue-dark: #1255c8;
            --btn-cyan: #38b6ff;
            --text-light: #ffffff;
            --text-dark: #333333;
        }

        body {
            background-color: #1a1a1a;
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        .device {
            background-color: var(--device-bg);
            width: 380px;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.1),
                10px 15px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* Speaker Grill & Volume Controls */
        .top-left-section {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 5;
        }

        .speaker {
            width: 50px;
            height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            border-top-left-radius: 20px;
            border-bottom-right-radius: 20px;
            background: rgba(0, 0, 0, 0.1);
            padding: 10px;
            box-sizing: border-box;
        }
        .speaker-hole {
            width: 6px;
            height: 6px;
            background-color: #333;
            border-radius: 50%;
        }

        .volume-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.1);
            padding: 8px 4px;
            border-radius: 10px;
        }

        .gain-slider {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            width: 8px;
            height: 80px;
            cursor: pointer;
        }

        .vol-label {
            font-size: 0.65rem;
            color: #111;
            font-weight: bold;
        }

        .btn-reset-vol {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid #333;
            background: #eee;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Display Screen */
        .display-container {
            background-color: var(--display-bg);
            border-radius: 15px;
            height: 90px;
            margin-top: 10px;
            margin-left: 75px; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            border: 4px solid #66c4c4;
        }

        .display-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3.5rem;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Top Controls (ON/OFF & LOOP) - Adjusted Layout */
        .top-controls {
            display: flex;
            justify-content: flex-end; /* Correr a la derecha */
            margin-top: -10px;
            padding: 0 10px;
            gap: 15px; /* Espacio entre botones */
        }

        .btn-power {
            background-color: var(--btn-red);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--btn-red-dark), 0 10px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            line-height: 1.1;
            transform: rotate(-10deg);
        }
        .btn-power:active {
            transform: translateY(5px) rotate(-10deg);
            box-shadow: 0 0 0 var(--btn-red-dark), 0 5px 5px rgba(0,0,0,0.3);
        }

        .btn-loop {
            background-color: #555;
            border: none;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #333, 0 10px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
            line-height: 1.2;
        }
        .btn-loop.active {
            background-color: #ffb703;
            color: #000;
            box-shadow: 0 5px 0 #d49800, 0 10px 10px rgba(0,0,0,0.3);
        }

        /* Middle Section: Spinners */
        .middle-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background-color: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 15px;
        }

        .keyboard-input-wrapper {
            background-color: #21b0b0;
            padding: 10px 5px;
            border-radius: 15px;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .keyboard-input-wrapper label { font-size: 0.6rem; color: #111; font-weight: bold; margin-bottom: 5px; }
        .keyboard-input-wrapper input { width: 55px; border: 2px solid #333; border-radius: 5px; font-size: 0.9rem; text-align: center; font-weight: bold; }

        .spinners-container { display: flex; gap: 10px; flex: 1; justify-content: center; }
        .spinner { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .spinner-btn { background-color: var(--btn-cyan); border: none; width: 35px; height: 25px; cursor: pointer; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .spinner-btn.down { clip-path: polygon(50% 100%, 0 0, 100% 0); }
        .spinner-value { background-color: #e0e0e0; color: #000; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; border: 3px solid #333; border-radius: 8px; }

        /* Bottom Section: Presets + Slider */
        .bottom-section {
            display: flex;
            justify-content: space-between;
            background-color: #0b0b0b;
            border-radius: 15px;
            padding: 15px;
            border: 4px solid #66c4c4;
            gap: 15px;
        }

        .presets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; }
        .preset-btn { background-color: var(--btn-blue); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 0.9rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 var(--btn-blue-dark); transition: transform 0.1s; }
        .preset-btn:active { transform: translateY(4px); }

        .slider-wrapper { width: 60px; background-color: #222; border-radius: 30px; position: relative; display: flex; justify-content: center; padding: 10px 0; box-shadow: inset 0 5px 10px rgba(0,0,0,0.8); }
        .slider-knob { width: 40px; height: 70px; background-color: var(--btn-red); border-radius: 20px; cursor: grab; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 8px 0; box-sizing: border-box; touch-action: none; position: absolute; z-index: 10; }
        .knob-arrow { color: white; font-size: 0.8rem; pointer-events: none; }
    </style>
</head>
<body>

    <div class="device">
        <div class="top-left-section">
            <div class="speaker">
                <div class="speaker-hole"></div><div class="speaker-hole"></div>
                <div class="speaker-hole"></div><div class="speaker-hole"></div>
                <div class="speaker-hole"></div><div class="speaker-hole"></div>
            </div>
            <div class="volume-control">
                <span class="vol-label">VOL</span>
                <input type="range" id="gain-slider" class="gain-slider" min="0" max="3" step="0.1" value="1">
                <button class="btn-reset-vol" id="btn-reset-vol" title="Reset Vol">R</button>
            </div>
        </div>

        <div class="display-container">
            <div class="display-text" id="display">00:00:24</div>
        </div>

        <div class="top-controls">
            <!-- Botones movidos a la derecha para evitar solapamiento con volumen -->
            <button class="btn-power" id="btn-power">ON/<br>OFF</button>
            <button class="btn-loop active" id="btn-loop">LOOP<br>⟳</button>
        </div>

        <div class="middle-section">
            <div class="keyboard-input-wrapper">
                <label>Teclado</label>
                <input type="number" id="keyboard-input" min="0" placeholder="Segs">
            </div>
            
            <div class="spinners-container">
                <div class="spinner">
                    <button class="spinner-btn up" onclick="addTime(3600)"></button>
                    <div class="spinner-value" id="val-h">0</div>
                    <button class="spinner-btn down" onclick="addTime(-3600)"></button>
                </div>
                <div class="spinner">
                    <button class="spinner-btn up" onclick="addTime(60)"></button>
                    <div class="spinner-value" id="val-m">0</div>
                    <button class="spinner-btn down" onclick="addTime(-60)"></button>
                </div>
                <div class="spinner">
                    <button class="spinner-btn up" onclick="addTime(1)"></button>
                    <div class="spinner-value" id="val-s">24</div>
                    <button class="spinner-btn down" onclick="addTime(-1)"></button>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="presets-grid">
                <button class="preset-btn" onclick="setTime(24)">24s</button>
                <button class="preset-btn" onclick="setTime(30)">30s</button>
                <button class="preset-btn" onclick="setTime(60)">1m</button>
                <button class="preset-btn" onclick="setTime(300)">5m</button>
                <button class="preset-btn" onclick="setTime(1800)">30m</button>
                <button class="preset-btn" onclick="setTime(3600)">1h</button>
            </div>
            
            <div class="slider-wrapper" id="slider-track">
                <div class="slider-knob" id="drag-knob">
                    <div class="knob-arrow">▲</div>
                    <div class="knob-arrow">▼</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTime = 24;
        let originalTime = 24;
        let timerInterval = null;
        let isRunning = false;
        let isLooping = true;
        let audioCtx = null;
        let masterGainNode = null;

        const display = document.getElementById('display');
        const valH = document.getElementById('val-h');
        const valM = document.getElementById('val-m');
        const valS = document.getElementById('val-s');
        const keyboardInput = document.getElementById('keyboard-input');
        const btnPower = document.getElementById('btn-power');
        const btnLoop = document.getElementById('btn-loop');
        const dragKnob = document.getElementById('drag-knob');
        const gainSlider = document.getElementById('gain-slider');
        const btnResetVol = document.getElementById('btn-reset-vol');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGainNode = audioCtx.createGain();
                masterGainNode.connect(audioCtx.destination);
                masterGainNode.gain.value = parseFloat(gainSlider.value);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        gainSlider.addEventListener('input', () => {
            if (masterGainNode) {
                masterGainNode.gain.setTargetAtTime(parseFloat(gainSlider.value), audioCtx.currentTime, 0.05);
            }
        });

        btnResetVol.addEventListener('click', () => {
            gainSlider.value = 1;
            if (masterGainNode) {
                masterGainNode.gain.setTargetAtTime(1, audioCtx.currentTime, 0.05);
            }
        });

        function midiToFreq(note) {
            return 440 * Math.pow(2, (note - 69) / 12);
        }

        function playAlarm() {
            initAudio();
            if (!audioCtx) return;

            // Acorde A Mayor Refinado: A3(57), E4(64), C#5(73), E5(76)
            const notes = [57, 64, 73, 76];

            notes.forEach(note => {
                const freq = midiToFreq(note);
                
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle'; 
                osc.frequency.value = freq;

                const noteGain = audioCtx.createGain();
                noteGain.connect(masterGainNode);

                const now = audioCtx.currentTime;
                noteGain.gain.setValueAtTime(0, now);
                noteGain.gain.linearRampToValueAtTime(0.3, now + 0.01);
                noteGain.gain.exponentialRampToValueAtTime(0.005, now + 2.5);

                // Armónico para simular el brillo de un piano
                const harmonics = [2, 3];
                harmonics.forEach(h => {
                    const hOsc = audioCtx.createOscillator();
                    hOsc.type = 'sine';
                    hOsc.frequency.value = freq * h;
                    const hGain = audioCtx.createGain();
                    hGain.gain.setValueAtTime(0.05 / h, now);
                    hGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                    hOsc.connect(hGain);
                    hGain.connect(noteGain);
                    hOsc.start(now);
                    hOsc.stop(now + 2.6);
                });

                osc.connect(noteGain);
                osc.start(now);
                osc.stop(now + 2.6);
            });
        }

        function updateUI() {
            if (currentTime < 0) currentTime = 0;
            const h = Math.floor(currentTime / 3600);
            const m = Math.floor((currentTime % 3600) / 60);
            const s = currentTime % 60;
            display.innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            valH.innerText = h;
            valM.innerText = String(m).padStart(2, '0');
            valS.innerText = String(s).padStart(2, '0');
            if(document.activeElement !== keyboardInput) keyboardInput.value = currentTime;
        }

        function addTime(seconds) {
            initAudio();
            currentTime += seconds;
            updateUI();
        }

        function setTime(seconds) {
            initAudio();
            currentTime = seconds;
            updateUI();
        }

        keyboardInput.addEventListener('change', (e) => {
            initAudio();
            const val = parseInt(e.target.value);
            if (!isNaN(val) && val >= 0) { currentTime = val; updateUI(); }
        });

        function toggleTimer() {
            initAudio();
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                btnPower.style.boxShadow = "0 5px 0 var(--btn-red-dark), 0 10px 10px rgba(0,0,0,0.3)";
                btnPower.style.transform = "rotate(-10deg)";
            } else {
                if (currentTime <= 0) return;
                isRunning = true;
                originalTime = currentTime;
                btnPower.style.boxShadow = "0 2px 0 var(--btn-red-dark), 0 5px 5px rgba(0,0,0,0.3)";
                btnPower.style.transform = "translateY(3px) rotate(-10deg)";
                
                timerInterval = setInterval(() => {
                    currentTime--;
                    updateUI();
                    if (currentTime <= 0) {
                        playAlarm();
                        if (isLooping) {
                            currentTime = originalTime;
                            updateUI();
                        } else {
                            clearInterval(timerInterval);
                            isRunning = false;
                            btnPower.style.boxShadow = "0 5px 0 var(--btn-red-dark), 0 10px 10px rgba(0,0,0,0.3)";
                            btnPower.style.transform = "rotate(-10deg)";
                        }
                    }
                }, 1000);
            }
        }

        btnPower.addEventListener('click', toggleTimer);
        btnLoop.addEventListener('click', () => {
            initAudio();
            isLooping = !isLooping;
            btnLoop.classList.toggle('active', isLooping);
        });

        let isDragging = false;
        let startY = 0;
        let accumulatedDelta = 0;
        const pixelsPerStep = 15;

        dragKnob.addEventListener('pointerdown', (e) => {
            initAudio();
            isDragging = true;
            startY = e.clientY;
            accumulatedDelta = 0;
            dragKnob.style.transition = 'none';
            dragKnob.setPointerCapture(e.pointerId);
        });

        dragKnob.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const delta = e.clientY - startY;
            dragKnob.style.transform = `translateY(${Math.max(-40, Math.min(40, delta))}px)`;

            if (delta - accumulatedDelta <= -pixelsPerStep) {
                addTime(3);
                accumulatedDelta -= pixelsPerStep;
            } else if (delta - accumulatedDelta >= pixelsPerStep) {
                addTime(-3);
                accumulatedDelta += pixelsPerStep;
            }
        });

        dragKnob.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            dragKnob.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            dragKnob.style.transform = `translateY(0px)`;
            dragKnob.releasePointerCapture(e.pointerId);
        });

        updateUI();
    </script>
</body>
</html>
