<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico</title>
    <!-- Favicon SVG en Base64 para que sea autocontenido -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23007acc'><path d='M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 0h8v8h-8z'/></svg>">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #252526;
            --header-bg: #333333;
            --header-active: #2a3d4d; /* Color cuando el panel tiene el foco */
            --border-color: #000000;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --resizer-color: #444444;
            --resizer-hover: #007acc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- BARRA SUPERIOR MINIMALISTA --- */
        #top-bar {
            background-color: var(--header-bg);
            display: flex;
            justify-content: center; /* Centrado para ser minimalista */
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            height: 40px;
            transition: height 0.3s ease, padding 0.3s ease, border-width 0.3s ease;
            overflow: hidden;
        }

        #top-bar.hidden {
            height: 0;
            border-bottom-width: 0;
        }

        .top-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .generator-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: #2a2a2a;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #444;
        }

        .num-input {
            width: 40px;
            background-color: #1e1e1e;
            border: 1px solid #555;
            color: white;
            padding: 3px;
            border-radius: 3px;
            text-align: center;
            font-size: 12px;
            outline: none;
        }

        .num-input:focus {
            border-color: var(--accent-color);
        }

        .separator {
            width: 1px;
            height: 20px;
            background-color: #555;
        }
        
        .btn-top {
            background-color: #444;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 26px;
        }
        
        .btn-top:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .btn-top svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* --- TIRADOR DEL MENÚ (Nuevo diseño) --- */
        #top-bar-wrapper {
            position: relative;
            z-index: 1000;
            background-color: var(--header-bg);
        }

        #menu-handle {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--header-bg);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 2px 20px;
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #menu-handle:hover {
            color: var(--accent-color);
            background-color: #3a3a3a;
        }

        #menu-handle svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            transition: transform 0.3s;
        }

        /* Rotar la flecha cuando el menú está oculto */
        #top-bar.hidden + #menu-handle svg {
            transform: rotate(180deg);
        }

        /* --- ESPACIO DE TRABAJO --- */
        #workspace {
            flex: 1;
            display: flex;
            width: 100%;
            /* El alto se ajusta automáticamente gracias al flex column del body */
        }

        .split-box {
            display: flex;
            flex: 1 1 100%;
            overflow: hidden;
        }

        .split-box.horizontal { flex-direction: row; }
        .split-box.vertical { flex-direction: column; }

        .panel {
            display: flex;
            flex-direction: column;
            flex: 1 1 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            min-width: 150px;
            min-height: 150px;
            position: relative;
            transition: border-color 0.2s;
        }

        /* Estilo para el panel ACTIVO (Foco) */
        .panel.active {
            border-color: var(--accent-color);
        }

        .panel.active .panel-header {
            background-color: var(--header-active);
        }

        .panel-header {
            background-color: var(--header-bg);
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 5px;
            gap: 5px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .url-input {
            flex: 1;
            background-color: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        .url-input:focus { border-color: var(--accent-color); }

        .btn {
            background: transparent;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 3px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { background-color: #555; color: white; }
        .btn svg { width: 14px; height: 14px; fill: currentColor; }
        .btn-close:hover { background-color: #e81123; }

        .panel-content {
            flex: 1;
            position: relative;
            background-color: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Overlay para el resizer */
        .iframe-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            z-index: 10;
            display: none;
        }

        /* NUEVO: Overlay para atrapar el primer clic (Foco) */
        .focus-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.02); /* Un tinte casi invisible */
            z-index: 5;
            cursor: pointer;
        }

        /* Si el panel está activo, la capa de foco desaparece para dejar usar el iframe */
        .panel.active .focus-overlay {
            display: none;
        }

        /* Divisores */
        .resizer {
            background-color: var(--resizer-color);
            z-index: 5;
            transition: background-color 0.2s;
        }

        .resizer:hover, .resizer.active { background-color: var(--resizer-hover); }
        .resizer-h { width: 6px; cursor: col-resize; margin: 0 -3px; }
        .resizer-v { height: 6px; cursor: row-resize; margin: -3px 0; }
    </style>
</head>
<body>

    <!-- Contenedor del menú con el tirador -->
    <div id="top-bar-wrapper">
        <div id="top-bar">
            <div class="top-actions">
                <!-- Bloque Generador -->
                <div class="generator-group">
                    <input type="number" id="num-frames" value="3" min="1" max="20" class="num-input" title="Cantidad de paneles a generar en el cuadro activo">
                    <button id="btn-gen-h" class="btn-top" title="Generar en Columnas (Lado a Lado)">|||</button>
                    <button id="btn-gen-v" class="btn-top" title="Generar en Filas (Arriba/Abajo)">三</button>
                </div>

                <div class="separator"></div>

                <!-- Botones Cargar/Guardar Minimalistas -->
                <button id="btn-load" class="btn-top" title="Cargar JSON (Subir)">
                    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                </button>
                <button id="btn-save" class="btn-top" title="Guardar JSON (Descargar)">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </button>
                <input type="file" id="file-input" accept=".json" style="display:none" />
            </div>
        </div>
        <!-- El tirador que siempre queda visible -->
        <div id="menu-handle" title="Mostrar/Ocultar Menú">
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
    </div>

    <div id="workspace">
        <!-- Paneles -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const workspace = document.getElementById('workspace');
            let activePanel = null; // Variable para rastrear el panel enfocado

            const icons = {
                go: `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`,
                splitH: `<svg viewBox="0 0 24 24"><path d="M3 3h8v18H3zm10 0h8v18h-8z"/></svg>`,
                splitV: `<svg viewBox="0 0 24 24"><path d="M3 3h18v8H3zm0 10h18v8H3z"/></svg>`,
                close: `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`
            };

            const defaultUrl = "https://es.wikipedia.org";

            // --- LÓGICA DEL MENÚ CON TIRADOR ---
            const topBar = document.getElementById('top-bar');
            const menuHandle = document.getElementById('menu-handle');
            
            menuHandle.addEventListener('click', () => {
                topBar.classList.toggle('hidden');
            });

            // --- LÓGICA DE FOCO (Click To Focus) ---
            function focusPanel(panel) {
                if (activePanel === panel) return;
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                panel.classList.add('active');
                activePanel = panel;
            }

            // --- GENERACIÓN INTELIGENTE EN PANEL ENFOCADO ---
            const btnGenH = document.getElementById('btn-gen-h');
            const btnGenV = document.getElementById('btn-gen-v');
            const numFramesInput = document.getElementById('num-frames');

            function buildNPanels(n, direction, urlBase) {
                if (n <= 1) return createPanel(urlBase);

                const container = document.createElement('div');
                container.className = `split-box ${direction}`;

                const firstNode = createPanel(urlBase);
                firstNode.style.flex = `1 1 ${100 / n}%`;

                const restNode = buildNPanels(n - 1, direction, urlBase);
                restNode.style.flex = `1 1 ${100 - (100 / n)}%`;

                const resizer = document.createElement('div');
                resizer.className = `resizer resizer-${direction === 'horizontal' ? 'h' : 'v'}`;

                container.appendChild(firstNode);
                container.appendChild(resizer);
                container.appendChild(restNode);

                return container;
            }

            const generateFrames = (direction) => {
                let count = parseInt(numFramesInput.value, 10);
                if (isNaN(count) || count < 1) count = 1;
                if (count > 50) count = 50; 
                
                // Si no hay panel activo (porque se borraron todos), tomamos el primero
                if (!activePanel) activePanel = document.querySelector('.panel');

                if (activePanel) {
                    const urlActual = activePanel.querySelector('.url-input').value;
                    const newTree = buildNPanels(count, direction, urlActual);
                    
                    // Respetar el tamaño original del panel que vamos a subdividir
                    newTree.style.flex = activePanel.style.flex || '1 1 100%';
                    
                    activePanel.parentNode.replaceChild(newTree, activePanel);
                    activePanel = null; // Se limpiará y se reasignará al pasar el ratón
                } else {
                    // Si el lienzo está 100% en blanco
                    workspace.innerHTML = '';
                    workspace.appendChild(buildNPanels(count, direction, defaultUrl));
                }
            };

            btnGenH.addEventListener('click', () => generateFrames('horizontal'));
            btnGenV.addEventListener('click', () => generateFrames('vertical'));


            // --- CREACIÓN DE PANELES ---
            function createPanel(url = defaultUrl) {
                const panel = document.createElement('div');
                panel.className = 'panel';
                panel.style.flex = '1 1 100%';

                panel.innerHTML = `
                    <div class="panel-header">
                        <input type="text" class="url-input" value="${url}" placeholder="Ingresa URL" />
                        <button class="btn btn-go" title="Ir">${icons.go}</button>
                        <div style="flex: 0 0 5px;"></div>
                        <button class="btn btn-split-h" title="Dividir Lado a Lado">${icons.splitH}</button>
                        <button class="btn btn-split-v" title="Dividir Arriba/Abajo">${icons.splitV}</button>
                        <button class="btn btn-close" title="Cerrar Panel">${icons.close}</button>
                    </div>
                    <div class="panel-content">
                        <div class="iframe-overlay"></div>
                        <div class="focus-overlay" title="Haz clic para activar este panel"></div>
                        <iframe src="${url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                `;

                // Evento para activar el FOCO al hacer clic en el overlay o la cabecera
                panel.querySelector('.focus-overlay').addEventListener('mousedown', () => focusPanel(panel));
                panel.querySelector('.panel-header').addEventListener('mousedown', () => focusPanel(panel));

                const input = panel.querySelector('.url-input');
                const btnGo = panel.querySelector('.btn-go');
                const iframe = panel.querySelector('iframe');
                const btnSplitH = panel.querySelector('.btn-split-h');
                const btnSplitV = panel.querySelector('.btn-split-v');
                const btnClose = panel.querySelector('.btn-close');

                const navigate = () => {
                    let newUrl = input.value.trim();
                    if (newUrl && !newUrl.startsWith('http://') && !newUrl.startsWith('https://')) {
                        newUrl = 'https://' + newUrl;
                    }

                    const youtubeRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                    const ytMatch = newUrl.match(youtubeRegex);
                    if (ytMatch && ytMatch[1]) {
                        newUrl = `https://www.youtube.com/embed/${ytMatch[1]}`;
                    }

                    input.value = newUrl;
                    iframe.src = newUrl;
                };

                btnGo.addEventListener('click', navigate);
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') navigate(); });
                btnSplitH.addEventListener('click', () => splitPanel(panel, 'horizontal'));
                btnSplitV.addEventListener('click', () => splitPanel(panel, 'vertical'));
                btnClose.addEventListener('click', () => closePanel(panel));

                return panel;
            }

            // --- FUNCIONES DE DIVISIÓN Y CIERRE ---
            function splitPanel(panel, direction) {
                const parent = panel.parentNode;
                const urlActual = panel.querySelector('.url-input').value;
                
                const container = document.createElement('div');
                container.className = `split-box ${direction}`;
                container.style.flex = panel.style.flex || '1 1 100%';

                const resizer = document.createElement('div');
                resizer.className = `resizer resizer-${direction === 'horizontal' ? 'h' : 'v'}`;

                const newPanel = createPanel(urlActual);

                panel.style.flex = '1 1 50%';
                newPanel.style.flex = '1 1 50%';

                parent.replaceChild(container, panel);
                container.appendChild(panel);
                container.appendChild(resizer);
                container.appendChild(newPanel);
            }

            function closePanel(panel) {
                if (activePanel === panel) activePanel = null;

                const container = panel.parentNode;
                if (container.id === 'workspace') {
                    panel.querySelector('.url-input').value = 'about:blank';
                    panel.querySelector('iframe').src = 'about:blank';
                    return;
                }

                const grandParent = container.parentNode;
                let sibling = (panel.nextElementSibling && panel.nextElementSibling.classList.contains('resizer')) 
                    ? panel.nextElementSibling.nextElementSibling 
                    : panel.previousElementSibling.previousElementSibling;

                sibling.style.flex = container.style.flex || '1 1 100%';
                grandParent.replaceChild(sibling, container);
            }

            // --- SERIALIZACIÓN Y ARCHIVOS JSON (Cargar/Guardar) ---
            const btnSave = document.getElementById('btn-save');
            const btnLoad = document.getElementById('btn-load');
            const fileInput = document.getElementById('file-input');

            function serializeNode(element) {
                if (element.classList.contains('panel')) {
                    return { type: 'panel', url: element.querySelector('.url-input').value, flex: element.style.flex || '1 1 100%' };
                } else if (element.classList.contains('split-box')) {
                    const direction = element.classList.contains('horizontal') ? 'horizontal' : 'vertical';
                    const children = Array.from(element.children).filter(c => !c.classList.contains('resizer'));
                    return { type: 'split', direction: direction, flex: element.style.flex || '1 1 100%', children: children.map(serializeNode) };
                }
            }

            function deserializeNode(data) {
                if (data.type === 'panel') {
                    const p = createPanel(data.url);
                    if (data.flex) p.style.flex = data.flex;
                    return p;
                } else if (data.type === 'split') {
                    const container = document.createElement('div');
                    container.className = `split-box ${data.direction}`;
                    if (data.flex) container.style.flex = data.flex;

                    const c1 = deserializeNode(data.children[0]);
                    const c2 = deserializeNode(data.children[1]);
                    const resizer = document.createElement('div');
                    resizer.className = `resizer resizer-${data.direction === 'horizontal' ? 'h' : 'v'}`;

                    container.appendChild(c1);
                    container.appendChild(resizer);
                    container.appendChild(c2);
                    return container;
                }
            }

            // Arbol Inteligente (Por si subes lista cruda de URLs)
            function buildSmartDistribution(urls) {
                if (urls.length === 0) return createPanel();
                if (urls.length === 1) return createPanel(urls[0]);

                let rowsCount = Math.round(Math.sqrt(urls.length));
                const rows = [];
                let remaining = urls.length;
                let index = 0;

                for (let i = 0; i < rowsCount; i++) {
                    let take = Math.ceil(remaining / (rowsCount - i));
                    rows.push(urls.slice(index, index + take));
                    index += take; remaining -= take;
                }
                return buildVerticalTree(rows);
            }

            function buildVerticalTree(rows) {
                if (rows.length === 1) return buildHorizontalTree(rows[0]);
                const container = document.createElement('div');
                container.className = 'split-box vertical';

                const topNode = buildHorizontalTree(rows[0]);
                topNode.style.flex = `1 1 ${100 / rows.length}%`;

                const bottomNode = buildVerticalTree(rows.slice(1));
                bottomNode.style.flex = `1 1 ${100 - (100 / rows.length)}%`;

                const resizer = document.createElement('div');
                resizer.className = 'resizer resizer-v';

                container.appendChild(topNode);
                container.appendChild(resizer);
                container.appendChild(bottomNode);
                return container;
            }

            function buildHorizontalTree(urls) {
                if (urls.length === 1) return createPanel(urls[0]);
                const mid = Math.ceil(urls.length / 2);
                const container = document.createElement('div');
                container.className = 'split-box horizontal';

                const leftNode = buildHorizontalTree(urls.slice(0, mid));
                leftNode.style.flex = `1 1 ${(urls.slice(0, mid).length / urls.length) * 100}%`;

                const rightNode = buildHorizontalTree(urls.slice(mid));
                rightNode.style.flex = `1 1 ${(urls.slice(mid).length / urls.length) * 100}%`;

                const resizer = document.createElement('div');
                resizer.className = 'resizer resizer-h';

                container.appendChild(leftNode);
                container.appendChild(resizer);
                container.appendChild(rightNode);
                return container;
            }

            btnSave.addEventListener('click', () => {
                const root = workspace.firstElementChild;
                if (!root) return;
                const json = JSON.stringify(serializeNode(root), null, 2);
                let filename = prompt("Nombre de la sesión (.json):", "sesion_sintes.json");
                if (!filename) return; 
                if (!filename.endsWith('.json')) filename += '.json';

                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            });

            btnLoad.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        workspace.innerHTML = ''; 
                        if (Array.isArray(data)) workspace.appendChild(buildSmartDistribution(data));
                        else workspace.appendChild(deserializeNode(data));
                    } catch(err) { alert("Error al cargar JSON."); }
                    fileInput.value = "";
                };
                reader.readAsText(file);
            });

            // --- ARRASTRE DE DIVISORES ---
            let isResizing = false;
            let currentResizer = null;

            workspace.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resizer')) {
                    isResizing = true;
                    currentResizer = e.target;
                    currentResizer.classList.add('active');
                    document.querySelectorAll('.iframe-overlay').forEach(el => el.style.display = 'block');
                    document.body.style.cursor = currentResizer.classList.contains('resizer-h') ? 'col-resize' : 'row-resize';
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing || !currentResizer) return;
                const container = currentResizer.parentNode;
                const prev = currentResizer.previousElementSibling;
                const next = currentResizer.nextElementSibling;
                const rect = container.getBoundingClientRect();

                if (container.classList.contains('horizontal')) {
                    let percent = ((e.clientX - rect.left) / rect.width) * 100;
                    percent = Math.max(10, Math.min(90, percent));
                    prev.style.flex = `1 1 ${percent}%`;
                    next.style.flex = `1 1 ${100 - percent}%`;
                } else {
                    let percent = ((e.clientY - rect.top) / rect.height) * 100;
                    percent = Math.max(10, Math.min(90, percent));
                    prev.style.flex = `1 1 ${percent}%`;
                    next.style.flex = `1 1 ${100 - percent}%`;
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    if (currentResizer) currentResizer.classList.remove('active');
                    currentResizer = null;
                    document.body.style.cursor = 'default';
                    document.querySelectorAll('.iframe-overlay').forEach(el => el.style.display = 'none');
                }
            });

            // Inicializar
            const initialPanel = createPanel(defaultUrl);
            workspace.appendChild(initialPanel);
            focusPanel(initialPanel); // Asegurar que el primero empiece con foco
        });
    </script>
</body>
</html>
