<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Delta Urbano: Strudel a MIDI</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; font-family: monospace; }
        button { background: #4a90e2; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background: #357abd; }
        #output { margin-top: 20px; padding: 10px; background: #333; border-left: 4px solid #4a90e2; word-break: break-all; font-family: monospace; }
        h2 { color: #4a90e2; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Conversor Strudel -> MIDI</h2>
    <p style="font-size: 0.8em; color: #888;">Ingresá notas separadas por espacios (ej: c1 eb2 f#3)</p>
    
    <textarea id="inputStrudel" placeholder="c1 d1 f#3 d3 ab3"></textarea>
    
    <button onclick="convertir()">Transformar a MIDI</button>

    <div id="output">Los números aparecerán acá...</div>
    
    <button onclick="copiar()" style="background: #444; font-size: 0.8em;">Copiar para WebChucK</button>
</div>

<script>
function convertir() {
    const input = document.getElementById('inputStrudel').value.toLowerCase();
    const outputDiv = document.getElementById('output');
    
    const notasBase = {
        'c': 0, 'c#': 1, 'db': 1, 'd': 2, 'd#': 3, 'eb': 3, 
        'e': 4, 'f': 5, 'f#': 6, 'gb': 6, 'g': 7, 'g#': 8, 
        'ab': 8, 'a': 9, 'a#': 10, 'bb': 10, 'b': 11
    };

    // Regex para capturar nota (letras y alteración) y octava (número)
    const regex = /([a-g][#b]?)(-?\d+)/g;
    let match;
    let resultados = [];

    while ((match = regex.exec(input)) !== null) {
        const nombreNota = match[1];
        const octava = parseInt(match[2]);
        
        if (notasBase.hasOwnProperty(nombreNota)) {
            // Formula MIDI estándar: (Octava + 1) * 12 + NotaBase
            // Strudel suele usar C3 como 60, igual que el estándar MIDI.
            const midi = (octava + 1) * 12 + notasBase[nombreNota];
            resultados.push(midi);
        }
    }

    outputDiv.innerText = resultados.length > 0 ? resultados.join(' ') : "No se detectaron notas válidas.";
}

function copiar() {
    const texto = document.getElementById('output').innerText;
    navigator.clipboard.writeText(texto);
    alert("¡Copiado! Pegalo en tu array de ChucK.");
}
</script>

</body>
</html>
