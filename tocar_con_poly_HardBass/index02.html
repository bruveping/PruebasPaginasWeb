<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymoog D - Vintage Emulation</title>
<style>
:root {
  --bg: #1a1a1a;
  --panel: #2c2c2c;
  --wood: #5d3a24;
  --border: #444;
  --text: #eee;
  --accent: #ffcc00; /* Moog Yellow */
  --knob: #111;
}
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  display: flex; flex-direction: column; align-items: center;
}
.synth-case {
  background: var(--wood);
  padding: 10px;
  border-radius: 4px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}
.main-panel {
  background: var(--panel);
  border: 2px solid #000;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
}
.module {
  background: #222;
  padding: 15px;
  border: 1px solid #333;
}
.module h2 {
  font-size: 10px;
  letter-spacing: 2px;
  color: #888;
  text-transform: uppercase;
  border-bottom: 1px solid #444;
  margin-bottom: 15px;
  text-align: center;
}
.ctrl {
  display: flex; flex-direction: column;
  margin-bottom: 12px; font-size: 11px;
}
.ctrl label { margin-bottom: 5px; color: #aaa; text-transform: uppercase; font-size: 9px; }
input[type=range] { accent-color: var(--accent); cursor: pointer; }
.val { color: var(--accent); font-family: monospace; font-size: 10px; align-self: flex-end; }

/* Keyboard styling */
.kb-section { width: 100%; max-width: 1000px; margin-top: 20px; background: #000; padding: 10px; }
.kb-wrap { position: relative; height: 120px; border: 2px solid #000; }
.white-key {
  position: absolute; background: #fff; border: 1px solid #ccc;
  height: 100%; width: 3.33%; box-sizing: border-box; z-index: 1;
}
.black-key {
  position: absolute; background: #000; height: 60%; width: 2.2%;
  z-index: 2; border: 1px solid #333;
}
.white-key.active, .black-key.active { background: var(--accent) !important; }

.status-bar {
  width: 100%; max-width: 1000px; background: #111; 
  padding: 10px; margin-top: 10px; display: flex; justify-content: space-between;
  font-size: 10px; border: 1px solid #333;
}
</style>
</head>
<body>

<h1 style="margin-bottom:20px; letter-spacing:10px; font-weight:300;">POLYMOOG <span style="color:var(--accent)">D</span></h1>

<div class="synth-case">
  <div class="main-panel">
    <div class="module">
      <h2>Oscillator Bank</h2>
      <div class="ctrl">
        <label>Osc 1 (Sierra/Square)</label>
        <input type="range" id="osc1-mix" min="0" max="1" step="0.01" value="0.7">
        <span class="val" id="vv-osc1-mix">0.70</span>
      </div>
      <div class="ctrl">
        <label>Osc 2 (Detune/Fat)</label>
        <input type="range" id="osc2-mix" min="0" max="1" step="0.01" value="0.5">
        <input type="range" id="osc2-detune" min="-30" max="30" step="1" value="7">
        <span class="val">Detune: <span id="vv-osc2-detune">7</span>c</span>
      </div>
      <div class="ctrl">
        <label>Osc 3 (Sub/Noise)</label>
        <input type="range" id="osc3-mix" min="0" max="1" step="0.01" value="0.2">
        <span class="val" id="vv-osc3-mix">0.20</span>
      </div>
    </div>

    <div class="module">
      <h2>Ladder Filter</h2>
      <div class="ctrl">
        <label>Cutoff Frequency</label>
        <input type="range" id="filter-cutoff" min="20" max="12000" step="1" value="1500">
        <span class="val" id="vv-filter-cutoff">1500 Hz</span>
      </div>
      <div class="ctrl">
        <label>Emphasis (Resonance)</label>
        <input type="range" id="filter-q" min="0.1" max="20" step="0.1" value="4">
        <span class="val" id="vv-filter-q">4.0</span>
      </div>
      <div class="ctrl">
        <label>Contour (Env Amount)</label>
        <input type="range" id="filter-env" min="0" max="10000" step="10" value="3000">
        <span class="val" id="vv-filter-env">3000</span>
      </div>
    </div>

    <div class="module">
      <h2>Envelopes</h2>
      <div class="ctrl"><label>Attack</label><input type="range" id="env-attack" min="0.001" max="2" step="0.001" value="0.005"></div>
      <div class="ctrl"><label>Decay</label><input type="range" id="env-decay" min="0.01" max="4" step="0.01" value="0.6"></div>
      <div class="ctrl"><label>Sustain</label><input type="range" id="env-sustain" min="0" max="1" step="0.01" value="0.4"></div>
      <div class="ctrl"><label>Release</label><input type="range" id="env-release" min="0.01" max="5" step="0.01" value="0.8"></div>
    </div>

    <div class="module">
      <h2>Output</h2>
      <div class="ctrl">
        <label>Overload (Saturación)</label>
        <input type="range" id="drive" min="1" max="10" step="0.1" value="2">
      </div>
      <div class="ctrl">
        <label>Master Volume</label>
        <input type="range" id="master-gain" min="0" max="1" step="0.01" value="0.5">
      </div>
      <div style="text-align:center; margin-top:20px;">
        <div id="midi-led" style="width:10px; height:10px; border-radius:50%; background:#333; display:inline-block;"></div>
        <div style="font-size:8px; color:var(--accent); margin-top:5px;">MIDI ACTIVE</div>
      </div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="device-name">MINIMOOG EMULATION MODE</span>
  <span id="voice-count">VOICES: 0</span>
</div>

<div class="kb-section">
  <div class="kb-wrap" id="kb-wrap"></div>
</div>

<script>
let ctx = null;
let masterGain, driveNode, filterNode;
const voices = new Map();

function ensureAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Saturación tipo Moog
  driveNode = ctx.createWaveShaper();
  function makeDistortionCurve(amount) {
    let k = amount, n_samples = 44100, curve = new Float32Array(n_samples);
    for (let i = 0; i < n_samples; ++i ) {
      let x = i * 2 / n_samples - 1;
      curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x));
    }
    return curve;
  }
  driveNode.curve = makeDistortionCurve(50);
  
  filterNode = ctx.createBiquadFilter();
  filterNode.type = 'lowpass';
  
  masterGain = ctx.createGain();
  
  filterNode.connect(driveNode);
  driveNode.connect(masterGain);
  masterGain.connect(ctx.destination);
  
  syncParams();
}

function P(id) { return document.getElementById(id).value; }

function syncParams() {
  if (!ctx) return;
  const t = ctx.currentTime;
  filterNode.frequency.setTargetAtTime(+P('filter-cutoff'), t, 0.02);
  filterNode.Q.setTargetAtTime(+P('filter-q'), t, 0.02);
  masterGain.gain.setTargetAtTime(+P('master-gain'), t, 0.02);
}

// Escuchar cambios en los sliders
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', (e) => {
    syncParams();
    const valEl = document.getElementById('vv-' + e.target.id);
    if(valEl) valEl.textContent = e.target.value;
  });
});

function noteOn(note, vel = 100) {
  ensureAudio();
  if (voices.has(note)) noteOff(note);

  const now = ctx.currentTime;
  const freq = 440 * Math.pow(2, (note - 69) / 12);
  
  // Voice Master Gain (Envolvente de Volumen)
  const vGain = ctx.createGain();
  vGain.gain.setValueAtTime(0, now);
  vGain.gain.linearRampToValueAtTime(0.5, now + +P('env-attack'));
  vGain.gain.exponentialRampToValueAtTime(Math.max(0.001, +P('env-sustain') * 0.5), now + +P('env-attack') + +P('env-decay'));

  // Envolvente de Filtro (Característica Moog)
  const filterEnvAmount = +P('filter-env');
  const baseCutoff = +P('filter-cutoff');
  filterNode.frequency.cancelScheduledValues(now);
  filterNode.frequency.setValueAtTime(baseCutoff, now);
  filterNode.frequency.exponentialRampToValueAtTime(Math.min(20000, baseCutoff + filterEnvAmount), now + +P('env-attack'));

  // 3 Osciladores
  const oscs = [];
  const configs = [
    { type: 'sawtooth', mix: +P('osc1-mix'), detune: 0 },
    { type: 'sawtooth', mix: +P('osc2-mix'), detune: +P('osc2-detune') },
    { type: 'square',   mix: +P('osc3-mix'), detune: -1200 } // Sub osc
  ];

  configs.forEach(conf => {
    if (conf.mix <= 0) return;
    const osc = ctx.createOscillator();
    const oGain = ctx.createGain();
    osc.type = conf.type;
    osc.frequency.value = freq;
    osc.detune.value = conf.detune;
    oGain.gain.value = conf.mix;
    osc.connect(oGain);
    oGain.connect(vGain);
    osc.start();
    oscs.push(osc);
  });

  vGain.connect(filterNode);
  voices.set(note, { oscs, vGain });
  
  // UI
  document.getElementById('voice-count').textContent = `VOICES: ${voices.size}`;
  const key = document.querySelector(`[data-note="${note}"]`);
  if(key) key.classList.add('active');
}

function noteOff(note) {
  const v = voices.get(note);
  if (!v) return;
  const now = ctx.currentTime;
  const rel = +P('env-release');
  
  v.vGain.gain.cancelScheduledValues(now);
  v.vGain.gain.setValueAtTime(v.vGain.gain.value, now);
  v.vGain.gain.exponentialRampToValueAtTime(0.001, now + rel);
  
  v.oscs.forEach(o => o.stop(now + rel + 0.1));
  voices.delete(note);
  
  setTimeout(() => {
    document.getElementById('voice-count').textContent = `VOICES: ${voices.size}`;
    const key = document.querySelector(`[data-note="${note}"]`);
    if(key) key.classList.remove('active');
  }, rel * 1000);
}

// --- TECLADO VISUAL ---
function initKb() {
  const wrap = document.getElementById('kb-wrap');
  const isBlack = [1,3,6,8,10];
  let whiteIdx = 0;
  for(let n=48; n<=84; n++) {
    const key = document.createElement('div');
    key.dataset.note = n;
    if(isBlack.includes(n%12)) {
      key.className = 'black-key';
      key.style.left = ((whiteIdx - 0.6) * 3.33) + '%';
    } else {
      key.className = 'white-key';
      key.style.left = (whiteIdx * 3.33) + '%';
      whiteIdx++;
    }
    key.onmousedown = () => noteOn(n);
    key.onmouseup = () => noteOff(n);
    wrap.appendChild(key);
  }
}
initKb();

// Mapeo teclado PC
const PC_KEYS = {'a':60,'w':61,'s':62,'e':63,'d':64,'f':65,'t':66,'g':67,'y':68,'h':69,'u':70,'j':71,'k':72};
window.onkeydown = (e) => { if(PC_KEYS[e.key] && !e.repeat) noteOn(PC_KEYS[e.key]); };
window.onkeyup = (e) => { if(PC_KEYS[e.key]) noteOff(PC_KEYS[e.key]); };

// MIDI
navigator.requestMIDIAccess?.().then(midi => {
  for (let input of midi.inputs.values()) {
    input.onmidimessage = (msg) => {
      const [s, d1, d2] = msg.data;
      if((s & 0xf0) === 0x90 && d2 > 0) noteOn(d1, d2);
      else if((s & 0xf0) === 0x80 || ((s & 0xf0) === 0x90 && d2 === 0)) noteOff(d1);
      document.getElementById('midi-led').style.background = '#ffcc00';
      setTimeout(() => document.getElementById('midi-led').style.background = '#333', 100);
    };
  }
});
</script>
</body>
</html>
