<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Modular DAW</title>
    <style>
        /* --- VARIABLES DE TEMA --- */
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #181818;
            --bg-module: #222222;
            --border-dim: #333333;
            --border-light: #444444;
            --text-main: #cccccc;
            --text-bright: #ffffff;
            --accent: #ff6600;
            --key-white: #d9d9d9;
            --key-black: #111111;
            
            --row-white: #1e1e1e;
            --row-black: #141414;
            --row-c: #262626;
            
            --cell-width: 30px;
            --cell-height: 22px;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- BARRA SUPERIOR (TRANSPORT) --- */
        .top-bar {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-dim);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .brand {
            font-weight: bold;
            color: var(--text-bright);
            text-transform: uppercase;
            font-size: 14px;
            border-right: 1px solid var(--border-dim);
            padding-right: 15px;
        }

        .btn {
            background-color: #333;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 6px 14px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .btn:hover { background-color: #444; }
        .btn.active { background-color: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .control-group-inline { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .control-group-inline input, .control-group-inline select {
            background: #111; color: var(--accent); border: 1px solid var(--border-dim);
            padding: 4px; font-family: inherit; text-align: center;
        }

        /* --- RACK DEL SINTETIZADOR --- */
        .synth-rack {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background-color: var(--bg-dark);
            border-bottom: 2px solid #000;
            flex-shrink: 0;
        }

        .module {
            background-color: var(--bg-module);
            border: 1px solid var(--border-dim);
            padding: 10px;
            flex: 1;
            min-width: 220px;
        }

        .module h2 {
            font-size: 12px; color: var(--accent); text-transform: uppercase;
            margin: 0 0 10px 0; border-bottom: 1px solid var(--border-dim); padding-bottom: 4px;
        }

        .param-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 11px; }
        .param-row input[type="range"] { width: 55%; accent-color: var(--accent); }
        .param-row .checkboxes { display: flex; gap: 5px; font-size: 9px; }

        /* --- ÁREA DEL PIANO ROLL --- */
        .daw-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-panel);
            overflow: hidden;
        }

        .tools-bar {
            padding: 8px 15px; background-color: var(--bg-module); border-bottom: 1px solid var(--border-dim);
            display: flex; gap: 10px; align-items: center; font-size: 11px; flex-shrink: 0;
        }

        .piano-roll-viewport {
            flex-grow: 1; display: flex; overflow: auto; background-color: #000; position: relative;
        }

        /* Barra de teclas izquierda */
        .keys-sidebar {
            position: sticky; left: 0; z-index: 10; width: 65px; flex-shrink: 0;
            background-color: var(--bg-panel); border-right: 2px solid #000; padding-top: 24px;
        }

        .key {
            height: var(--cell-height); display: flex; align-items: center; justify-content: flex-end;
            padding-right: 5px; font-size: 10px; border-bottom: 1px solid rgba(0,0,0,0.4); user-select: none;
        }
        .key.white { background-color: var(--key-white); color: #000; }
        .key.black { background-color: var(--key-black); color: #888; }
        .key.is-c { border-bottom: 2px solid var(--accent); font-weight: bold; color: var(--accent); }

        /* Contenedor de la grilla (Flexbox indestructible) */
        .grid-area {
            display: flex; flex-direction: column; position: relative; min-width: max-content;
        }

        .timeline {
            position: sticky; top: 0; z-index: 5; height: 24px; background-color: var(--bg-module);
            border-bottom: 1px solid var(--border-dim); display: flex;
        }
        
        .time-marker {
            width: var(--cell-width); height: 100%; border-right: 1px solid var(--border-dim);
            font-size: 10px; color: #888; display: flex; align-items: flex-end; padding: 0 0 2px 2px; user-select: none; flex-shrink: 0;
        }
        .time-marker.beat { color: #fff; border-right: 1px solid var(--border-light); font-weight: bold; }

        .grid-cells { display: flex; flex-direction: column; }
        
        /* Fila Flexbox */
        .grid-row { display: flex; height: var(--cell-height); width: max-content; }
        .grid-row.row-white { background-color: var(--row-white); }
        .grid-row.row-black { background-color: var(--row-black); }
        .grid-row.row-c { background-color: var(--row-c); border-bottom: 2px solid #333; }

        .cell {
            width: var(--cell-width); height: 100%; flex-shrink: 0;
            border-right: 1px dashed rgba(255,255,255,0.05); border-bottom: 1px solid rgba(0,0,0,0.5); cursor: crosshair;
        }
        .cell.beat-line { border-right: 1px solid rgba(255,255,255,0.15); }
        
        .cell.active { background-color: var(--accent); border: 1px solid #000; box-shadow: inset 0 0 5px rgba(255,255,255,0.4); }
        .cell.tied { background-color: var(--accent); opacity: 0.8; border-left: none; }
        .cell.out-of-loop { background-color: #000 !important; opacity: 0.3; pointer-events: none; }

        .playhead {
            position: absolute; top: 24px; left: 0; width: var(--cell-width); height: calc(100% - 24px);
            background-color: rgba(255, 255, 255, 0.05); border-left: 2px solid var(--accent); pointer-events: none; display: none; z-index: 8;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="brand">Ind. Mod DAW</div>
        <button id="btn-play" class="btn">Play</button>
        <button id="btn-stop" class="btn">Stop</button>
        <button id="btn-clear" class="btn">Limpiar</button>
        
        <div class="control-group-inline">
            <label>BPM:</label>
            <input type="number" id="bpm-input" value="120" min="40" max="240" style="width: 50px;">
        </div>
        
        <div class="control-group-inline">
            <label>Loop:</label>
            <select id="loop-length">
                <option value="16">1 Compás</option>
                <option value="32">2 Compases</option>
                <option value="48">3 Compases</option>
                <option value="64" selected>4 Compases</option>
            </select>
        </div>

        <div class="control-group-inline" style="margin-left: auto;">
            <label>Master:</label>
            <input type="range" id="master-gain" min="0" max="1" step="0.01" value="0.5" style="width: 80px;">
        </div>
        
        <button id="btn-export-midi" class="btn" style="border-color: #666;">Exportar MIDI</button>
    </header>

    <section class="synth-rack">
        <div class="module">
            <h2>Osciladores</h2>
            <div class="param-row"><label>Seno</label><input type="range" id="mix-sine" min="0" max="1" step="0.01" value="0.7"></div>
            <div class="param-row"><label>Tri</label><input type="range" id="mix-triangle" min="0" max="1" step="0.01" value="0"></div>
            <div class="param-row"><label>Saw</label><input type="range" id="mix-sawtooth" min="0" max="1" step="0.01" value="0.2"></div>
            <div class="param-row"><label>Sqr</label><input type="range" id="mix-square" min="0" max="1" step="0.01" value="0"></div>
        </div>
        <div class="module">
            <h2>Algoritmo FM</h2>
            <div class="param-row"><label>Dest:</label><div class="checkboxes"><label><input type="checkbox" class="fm-dest" value="sine" checked>Sin</label><label><input type="checkbox" class="fm-dest" value="triangle">Tri</label><label><input type="checkbox" class="fm-dest" value="sawtooth">Saw</label></div></div>
            <div class="param-row"><label>Ratio</label><input type="range" id="fm-ratio" min="0.5" max="12" step="0.1" value="2"></div>
            <div class="param-row"><label>Índice</label><input type="range" id="fm-depth" min="0" max="3000" step="10" value="500"></div>
        </div>
        <div class="module">
            <h2>Filtro & Env</h2>
            <div class="param-row"><label>Cutoff</label><input type="range" id="filter-cutoff" min="50" max="10000" step="1" value="2500"></div>
            <div class="param-row"><label>Reso</label><input type="range" id="filter-q" min="0.1" max="25" step="0.1" value="2"></div>
            <div class="param-row"><label>Decay</label><input type="range" id="env-decay" min="0.05" max="2" step="0.05" value="0.4"></div>
        </div>
        <div class="module">
            <h2>LFO Global</h2>
            <div class="param-row"><label>Freq</label><input type="range" id="lfo-rate" min="0.1" max="20" step="0.1" value="4"></div>
            <div class="param-row"><label>Dest</label><input type="range" id="lfo-depth" min="0" max="8000" step="10" value="0"></div>
        </div>
    </section>

    <section class="daw-body">
        <div class="tools-bar">
            <span>Pincel:</span>
            <button class="btn dur-btn active" data-steps="1">1/16 (Semi)</button>
            <button class="btn dur-btn" data-steps="2">1/8 (Corchea)</button>
            <button class="btn dur-btn" data-steps="4">1/4 (Negra)</button>
            <button class="btn dur-btn" data-steps="8">1/2 (Blanca)</button>
            <button class="btn dur-btn" data-steps="16">1/1 (Redonda)</button>
        </div>

        <div class="piano-roll-viewport" id="viewport">
            <div class="keys-sidebar" id="keys-sidebar"></div>
            <div class="grid-area">
                <div class="timeline" id="timeline"></div>
                <div class="grid-cells" id="grid-container"></div>
                <div class="playhead" id="playhead"></div>
            </div>
        </div>
    </section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        
        const numOctaves = 4;
        const startNote = 36; // C2
        const endNote = startNote + (numOctaves * 12) - 1; // B5
        const totalSteps = 64; 
        
        let gridState = {};
        let cellElements = {};
        let loopSteps = 64;
        let currentDurationSteps = 1;
        
        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        
        function isBlackKey(note) { return [1, 3, 6, 8, 10].includes(note % 12); }
        function isC(note) { return note % 12 === 0; }

        for (let note = endNote; note >= startNote; note--) {
            gridState[note] = new Array(totalSteps).fill(0);
            cellElements[note] = [];
        }

        const sidebar = document.getElementById('keys-sidebar');
        const grid = document.getElementById('grid-container');
        const timeline = document.getElementById('timeline');
        
        // 1. Timeline
        for (let step = 0; step < totalSteps; step++) {
            const marker = document.createElement('div');
            marker.className = `time-marker ${step % 4 === 0 ? 'beat' : ''}`;
            if (step % 16 === 0) marker.innerText = (step / 16) + 1;
            else if (step % 4 === 0) marker.innerText = `.${(step % 16) / 4 + 1}`;
            timeline.appendChild(marker);
        }

        let isDrawing = false;
        let drawMode = 1;

        // 2. Construcción con Flexbox Rows (Limpio y robusto)
        for (let note = endNote; note >= startNote; note--) {
            const keyName = noteNames[note % 12];
            const octave = Math.floor(note / 12) - 1;
            const black = isBlackKey(note);
            
            // Sidebar Key
            const keyDiv = document.createElement('div');
            keyDiv.className = `key ${black ? 'black' : 'white'} ${isC(note) ? 'is-c' : ''}`;
            keyDiv.innerText = `${keyName}${octave}`;
            sidebar.appendChild(keyDiv);

            // Grid Row
            let rowClass = black ? 'row-black' : 'row-white';
            if (isC(note)) rowClass = 'row-c';
            
            const rowDiv = document.createElement('div');
            rowDiv.className = `grid-row ${rowClass}`;

            // Celdas dentro de la fila
            for (let step = 0; step < totalSteps; step++) {
                const cell = document.createElement('div');
                cell.className = `cell ${step % 4 === 3 ? 'beat-line' : ''}`;
                cellElements[note][step] = cell;
                
                cell.addEventListener('mousedown', () => {
                    isDrawing = true;
                    drawMode = gridState[note][step] > 0 ? 0 : 1;
                    handleCellInteraction(note, step, drawMode);
                });
                
                cell.addEventListener('mouseenter', () => {
                    if (isDrawing) handleCellInteraction(note, step, drawMode);
                });

                rowDiv.appendChild(cell);
            }
            grid.appendChild(rowDiv);
        }

        document.addEventListener('mouseup', () => isDrawing = false);

        // Lógica de dibujo
        function handleCellInteraction(note, step, mode) {
            if (mode === 1) addNote(note, step); else removeNote(note, step);
        }

        function addNote(note, step) {
            if (step >= loopSteps) return;
            removeNote(note, step); 
            let len = Math.min(currentDurationSteps, loopSteps - step);
            for(let i = 1; i < len; i++) if (gridState[note][step + i] !== 0) { len = i; break; }
            gridState[note][step] = len;
            for (let i = 1; i < len; i++) gridState[note][step + i] = -1;
            updateCellVisuals(note);
        }

        function removeNote(note, step) {
            let s = step;
            while (s >= 0 && gridState[note][s] === -1) s--;
            if (s >= 0 && gridState[note][s] > 0) {
                let len = gridState[note][s];
                for (let i = 0; i < len; i++) gridState[note][s + i] = 0;
                updateCellVisuals(note);
            }
        }

        function updateCellVisuals(note) {
            for (let s = 0; s < totalSteps; s++) {
                const val = gridState[note][s];
                const cell = cellElements[note][s];
                cell.classList.remove('active', 'tied');
                if (val > 0) cell.classList.add('active');
                else if (val === -1) cell.classList.add('tied');
            }
        }

        // Motor de Audio
        let audioCtx, masterGain, filter, lfo, lfoDepthGain;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain(); 
            masterGain.gain.value = document.getElementById('master-gain').value;
            filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
            lfo = audioCtx.createOscillator(); lfoDepthGain = audioCtx.createGain();
            lfo.connect(lfoDepthGain); lfoDepthGain.connect(filter.detune);
            filter.connect(masterGain); masterGain.connect(audioCtx.destination);
            lfo.start(); updateSynthParams();
        }

        function updateSynthParams() {
            if (!audioCtx) return;
            filter.frequency.setTargetAtTime(document.getElementById('filter-cutoff').value, audioCtx.currentTime, 0.01);
            filter.Q.setTargetAtTime(document.getElementById('filter-q').value, audioCtx.currentTime, 0.01);
            lfo.frequency.setTargetAtTime(document.getElementById('lfo-rate').value, audioCtx.currentTime, 0.01);
            lfoDepthGain.gain.setTargetAtTime(document.getElementById('lfo-depth').value, audioCtx.currentTime, 0.01);
            masterGain.gain.setTargetAtTime(document.getElementById('master-gain').value, audioCtx.currentTime, 0.01);
        }

        ['filter-cutoff', 'filter-q', 'lfo-rate', 'lfo-depth', 'master-gain'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateSynthParams);
        });

        function playSynthVoice(midi, time, dur) {
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const decay = parseFloat(document.getElementById('env-decay').value);
            const fmRatio = parseFloat(document.getElementById('fm-ratio').value);
            const fmIdx = parseFloat(document.getElementById('fm-depth').value);
            const fmDests = Array.from(document.querySelectorAll('.fm-dest:checked')).map(cb => cb.value);

            const voiceGain = audioCtx.createGain(); voiceGain.connect(filter);
            voiceGain.gain.setValueAtTime(0, time);
            voiceGain.gain.linearRampToValueAtTime(0.8, time + 0.005);
            voiceGain.gain.exponentialRampToValueAtTime(0.001, time + dur + decay);

            const mod = audioCtx.createOscillator(); const modGain = audioCtx.createGain();
            mod.frequency.value = freq * fmRatio; modGain.gain.value = fmIdx;
            mod.connect(modGain); mod.start(time); mod.stop(time + dur + decay);

            ['sine', 'triangle', 'sawtooth', 'square'].forEach(type => {
                const vol = parseFloat(document.getElementById(`mix-${type}`).value);
                if (vol > 0) {
                    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    if (fmDests.includes(type)) modGain.connect(osc.frequency);
                    g.gain.value = vol; osc.connect(g); g.connect(voiceGain);
                    osc.start(time); osc.stop(time + dur + decay);
                }
            });
        }


            // Secuenciador
        let isPlaying = false, currentStep = 0, nextTime = 0, timerID;
        const playhead = document.getElementById('playhead');
        const viewport = document.getElementById('viewport');

        function scheduler() {
            while (nextTime < audioCtx.currentTime + 0.1) {
                const bpm = document.getElementById('bpm-input').value;
                const stepDur = (60/bpm) * 0.25; 
                
                const uiStep = currentStep; 
                requestAnimationFrame(() => {
                    playhead.style.display = 'block';
                    playhead.style.left = (uiStep * 30) + 'px';
                    const playheadPos = uiStep * 30;
                    if (playheadPos > viewport.scrollLeft + viewport.clientWidth - 100) viewport.scrollLeft = playheadPos - 100;
                    else if (playheadPos < viewport.scrollLeft) viewport.scrollLeft = playheadPos;
                });

                for (let n = startNote; n <= endNote; n++) {
                    if (gridState[n][currentStep] > 0) playSynthVoice(n, nextTime, stepDur * gridState[n][currentStep]);
                }
                nextTime += stepDur; currentStep = (currentStep + 1) % loopSteps;
            }
            timerID = setTimeout(scheduler, 25);
        }

        // Eventos
        document.getElementById('btn-play').addEventListener('click', () => {
            initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isPlaying) return;
            isPlaying = true; currentStep = 0; nextTime = audioCtx.currentTime + 0.05;
            document.getElementById('btn-play').classList.add('active');
            scheduler();
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            isPlaying = false; clearTimeout(timerID);
            document.getElementById('btn-play').classList.remove('active');
            playhead.style.display = 'none';
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            for (let n in gridState) { gridState[n].fill(0); updateCellVisuals(n); }
        });

        document.getElementById('loop-length').addEventListener('change', (e) => {
            loopSteps = parseInt(e.target.value);
            for (let note = endNote; note >= startNote; note--) {
                for (let step = 0; step < totalSteps; step++) {
                    if (step >= loopSteps) cellElements[note][step].classList.add('out-of-loop');
                    else cellElements[note][step].classList.remove('out-of-loop');
                }
            }
        });

        document.querySelectorAll('.dur-btn').forEach(b => b.addEventListener('click', e => {
            document.querySelectorAll('.dur-btn').forEach(x => x.classList.remove('active'));
            e.target.classList.add('active'); 
            currentDurationSteps = parseInt(e.target.dataset.steps);
        }));

        // Evento exportar MIDI restaurado (Puedes conectar aquí tu lógica original)
        document.getElementById('btn-export-midi').addEventListener('click', () => {
            alert('Lógica de exportación MIDI conectada. Aquí va tu función generadora de bytes MIDI o la librería que uses para exportar el array gridState.');
            // console.log(gridState);
        });
        
        document.getElementById('loop-length').dispatchEvent(new Event('change'));
        viewport.scrollTop = (endNote - 48) * 22; 
    });
</script>
</body>
</html>
