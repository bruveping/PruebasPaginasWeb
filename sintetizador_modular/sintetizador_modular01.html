<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Industrial Modular DAW - Pro Edition</title>
    <style>
        :root {
            --bg-dark: #050505;
            --bg-panel: #121212;
            --bg-module: #1a1a1a;
            --border-dim: #2a2a2a;
            --accent: #00f2ff; 
            --accent-2: #ff00ea; 
            --key-white: #e0e0e0;
            --key-black: #1a1a1a;
            
            --cell-height: 28px; 
            --cell-width: 36px;  
            --sidebar-width: 70px;
            --timeline-height: 30px;
            --touch-gutter: 20px; /* Barra libre a la derecha para navegación */
        }

        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #eee;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- UI TOP --- */
        .top-bar {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-dim);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            background-color: #222;
            color: #aaa;
            border: 1px solid #333;
            padding: 8px 12px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
        }
        .btn.active { background-color: var(--accent); color: #000; font-weight: bold; }
        .btn-export { background-color: #2a3a2a; border-color: #4a6a4a; color: #8f8; }

        /* --- SYNTH RACK --- */
        .synth-rack {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            background-color: #000;
            border-bottom: 2px solid #222;
        }

        .module {
            background-color: var(--bg-module);
            border: 1px solid var(--border-dim);
            padding: 12px;
            min-width: 180px;
            border-radius: 6px;
        }

        .module h2 { font-size: 10px; color: var(--accent); margin: 0 0 10px 0; text-transform: uppercase; }
        .param { display: flex; flex-direction: column; font-size: 10px; margin-bottom: 8px; }
        .param input[type="range"] { width: 100%; accent-color: var(--accent); }

        /* --- PIANO ROLL --- */
        .daw-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tools {
            background-color: #1a1a1a;
            padding: 8px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 8px;
            overflow-x: auto;
        }

        .piano-roll-viewport {
            flex-grow: 1;
            overflow: auto;
            background-color: #080808;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-container {
            position: sticky;
            top: 0;
            left: 0; /* Cambio para que el playhead se alinee bien */
            height: var(--timeline-height);
            background-color: #1a1a1a;
            z-index: 40;
            display: flex;
            width: max-content;
            border-bottom: 1px solid #333;
            padding-left: var(--sidebar-width);
        }

        .marker {
            width: var(--cell-width);
            height: 100%;
            border-right: 1px solid #222;
            font-size: 9px;
            display: flex;
            align-items: flex-end;
            padding: 0 0 4px 4px;
            color: #555;
            flex-shrink: 0;
        }
        .marker.beat { color: #aaa; border-right: 1px solid #444; }

        .sequencer-area {
            display: flex;
            flex-direction: column;
            width: max-content;
            position: relative;
        }

        .note-row {
            display: flex;
            height: var(--cell-height);
        }

        .key {
            width: var(--sidebar-width);
            height: 100%;
            flex-shrink: 0;
            position: sticky;
            left: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.4);
            border-right: 2px solid #000;
        }
        .key.white { background-color: var(--key-white); color: #000; }
        .key.black { background-color: var(--key-black); color: #888; }
        .key.c { background-color: #333; color: var(--accent); border-bottom: 1px solid var(--accent); }

        .cells-container { display: flex; position: relative; }

        .cell {
            width: var(--cell-width);
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.4);
            touch-action: none;
        }
        .cell.beat { border-right: 1px solid rgba(255,255,255,0.08); }

        .note-row.bg-white .cell { background-color: #111; }
        .note-row.bg-black .cell { background-color: #0c0c0c; }
        .note-row.bg-c .cell { background-color: #181818; }

        .cell.active { 
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: 1px solid #fff;
            box-shadow: 0 0 10px var(--accent);
            z-index: 2;
        }
        .cell.tied { 
            background: linear-gradient(90deg, var(--accent-2), var(--accent));
            opacity: 0.7; 
            border-left: none; 
        }
        
        .cell.out-of-range {
            background-color: #050505 !important;
            opacity: 0.2;
        }

        .playhead {
            position: absolute;
            top: 0;
            left: var(--sidebar-width);
            width: 2px;
            height: 100%;
            background-color: #fff;
            box-shadow: 0 0 15px #fff;
            z-index: 45;
            pointer-events: none;
            display: none;
        }

        /* Barra lateral derecha para navegación táctil (Gutter) */
        .nav-gutter {
            width: var(--touch-gutter);
            background-color: rgba(255,255,255,0.03);
            border-left: 1px solid #222;
            flex-shrink: 0;
            height: 100%;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div style="font-weight: 900; font-size: 14px; color: var(--accent);">INDUSTRIAL DAW</div>
        <button id="play" class="btn">Play</button>
        <button id="stop" class="btn">Stop</button>
        <button id="clear" class="btn">Limpiar</button>
        
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="number" id="bpm" value="120" min="40" max="240" style="width: 40px; background: #000; color: var(--accent); border: 1px solid #444;">
            <select id="loop-select" style="background: #000; color: #fff; border: 1px solid #444;">
                <option value="16">1 C</option>
                <option value="32">2 C</option>
                <option value="48">3 C</option>
                <option value="64" selected>4 C</option>
            </select>
        </div>
        <button id="export" class="btn btn-export">Export MIDI</button>
    </header>

    <div class="synth-rack">
        <div class="module">
            <h2>Osc Mix</h2>
            <div class="param"><label>Sine</label><input type="range" id="mix-sine" min="0" max="1" step="0.05" value="0.7"></div>
            <div class="param"><label>Saw</label><input type="range" id="mix-saw" min="0" max="1" step="0.05" value="0.3"></div>
            <div class="param"><label>Square</label><input type="range" id="mix-sqr" min="0" max="1" step="0.05" value="0.0"></div>
            <div class="param"><label>Tri</label><input type="range" id="mix-tri" min="0" max="1" step="0.05" value="0.0"></div>
        </div>
        <div class="module">
            <h2>ADSR</h2>
            <div class="param"><label>A</label><input type="range" id="adsr-a" min="0.005" max="0.5" step="0.01" value="0.01"></div>
            <div class="param"><label>D</label><input type="range" id="adsr-d" min="0.05" max="1" step="0.01" value="0.2"></div>
            <div class="param"><label>S</label><input type="range" id="adsr-s" min="0" max="1" step="0.01" value="0.3"></div>
            <div class="param"><label>R</label><input type="range" id="adsr-r" min="0.05" max="2" step="0.01" value="0.4"></div>
        </div>
        <div class="module">
            <h2>Master Filter</h2>
            <div class="param"><label>Volume</label><input type="range" id="master-vol" min="0" max="1" step="0.05" value="0.6"></div>
            <div class="param"><label>Cutoff (Hz)</label><input type="range" id="cutoff" min="50" max="10000" step="50" value="3000"></div>
            <div class="param"><label>Resonance (Q)</label><input type="range" id="resonance" min="0.1" max="20" step="0.1" value="1"></div>
        </div>
    </div>

    <div class="daw-container">
        <div class="tools">
            <button class="btn dur active" data-len="1">1/16</button>
            <button class="btn dur" data-len="2">1/8</button>
            <button class="btn dur" data-len="4">1/4</button>
            <button class="btn dur" data-len="8">1/2</button>
            <button class="btn dur" data-len="16">1/1</button>
        </div>

        <div class="piano-roll-viewport" id="viewport">
            <div class="timeline-container" id="timeline"></div>
            <div class="sequencer-area" id="sequencer">
                <div class="playhead" id="playhead"></div>
                <!-- Rows go here -->
            </div>
        </div>
    </div>

    <script>
        const STEPS = 64;
        const OCTAVES = 4;
        const START_MIDI = 36;
        const END_MIDI = START_MIDI + (OCTAVES * 12) - 1;
        const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        let gridState = {}; 
        let domCells = {};
        let currentLen = 1;
        let isDown = false;
        let mode = 1;
        let loopSteps = 64;

        const sequencer = document.getElementById('sequencer');
        const timeline = document.getElementById('timeline');
        const playhead = document.getElementById('playhead');

        for(let n = END_MIDI; n >= START_MIDI; n--) {
            gridState[n] = new Array(STEPS).fill(0);
            domCells[n] = [];
        }

        // Timeline
        for(let s = 0; s < STEPS; s++) {
            const m = document.createElement('div');
            m.className = `marker ${s % 4 === 0 ? 'beat' : ''}`;
            if(s % 16 === 0) m.innerText = (s/16)+1;
            timeline.appendChild(m);
        }

        // Grid Construction
        for(let n = END_MIDI; n >= START_MIDI; n--) {
            const isBlack = [1,3,6,8,10].includes(n % 12);
            const isC = n % 12 === 0;

            const row = document.createElement('div');
            row.className = `note-row ${isC ? 'bg-c' : (isBlack ? 'bg-black' : 'bg-white')}`;

            const k = document.createElement('div');
            k.className = `key ${isBlack ? 'black' : 'white'} ${isC ? 'c' : ''}`;
            k.innerHTML = NOTES[n % 12] + (Math.floor(n / 12) - 1);
            row.appendChild(k);

            const cellsCont = document.createElement('div');
            cellsCont.className = 'cells-container';
            
            for(let s = 0; s < STEPS; s++) {
                const c = document.createElement('div');
                c.className = `cell ${s % 4 === 3 ? 'beat' : ''}`;
                
                const handleStart = (e) => {
                    e.preventDefault();
                    isDown = true;
                    mode = gridState[n][s] !== 0 ? 0 : 1;
                    edit(n, s);
                };
                c.addEventListener('mousedown', handleStart);
                c.addEventListener('touchstart', handleStart);
                c.addEventListener('mouseenter', () => { if(isDown) edit(n, s); });
                
                domCells[n][s] = c;
                cellsCont.appendChild(c);
            }
            
            // Añadir barra libre de navegación a la derecha de la fila
            const nav = document.createElement('div');
            nav.className = 'nav-gutter';
            cellsCont.appendChild(nav);

            row.appendChild(cellsCont);
            sequencer.appendChild(row);
        }

        window.addEventListener('mouseup', () => isDown = false);
        window.addEventListener('touchend', () => isDown = false);

        function edit(n, s) {
            if (s >= loopSteps) return;
            if(mode === 1) {
                clearNote(n, s);
                let actualLen = Math.min(currentLen, loopSteps - s);
                for(let i=1; i<actualLen; i++) if(gridState[n][s+i] !== 0) { actualLen = i; break; }
                gridState[n][s] = actualLen;
                for(let i=1; i<actualLen; i++) gridState[n][s+i] = -1;
            } else {
                clearNote(n, s);
            }
            refreshRow(n);
        }

        function clearNote(n, s) {
            let start = s;
            while(start > 0 && gridState[n][start] === -1) start--;
            if(gridState[n][start] > 0) {
                let l = gridState[n][start];
                for(let i=0; i<l; i++) gridState[n][start+i] = 0;
            }
        }

        function refreshRow(n) {
            for(let s=0; s<STEPS; s++) {
                domCells[n][s].classList.remove('active', 'tied');
                if(gridState[n][s] > 0) domCells[n][s].classList.add('active');
                if(gridState[n][s] === -1) domCells[n][s].classList.add('tied');
            }
        }

        // --- AUDIO ---
        let ctx, masterGain, filter;
        function initAudio() {
            if(ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.connect(masterGain);
            masterGain.connect(ctx.destination);
        }

        function playNote(midi, time, dur) {
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const g = ctx.createGain();
            g.connect(filter);

            const waves = [
                { id: 'mix-sine', type: 'sine' },
                { id: 'mix-saw', type: 'sawtooth' },
                { id: 'mix-sqr', type: 'square' },
                { id: 'mix-tri', type: 'triangle' }
            ];

            waves.forEach(w => {
                const vol = parseFloat(document.getElementById(w.id).value);
                if(vol > 0) {
                    const o = ctx.createOscillator();
                    o.type = w.type;
                    o.frequency.value = freq;
                    const og = ctx.createGain();
                    og.gain.value = vol;
                    o.connect(og); og.connect(g);
                    o.start(time);
                    o.stop(time + dur + 2.0);
                }
            });

            const a = parseFloat(document.getElementById('adsr-a').value);
            const d = parseFloat(document.getElementById('adsr-d').value);
            const s = parseFloat(document.getElementById('adsr-s').value);
            const r = parseFloat(document.getElementById('adsr-r').value);
            
            // Actualización de Filtro y Resonancia
            filter.frequency.setTargetAtTime(document.getElementById('cutoff').value, time, 0.01);
            filter.Q.setTargetAtTime(document.getElementById('resonance').value, time, 0.01);
            
            masterGain.gain.setTargetAtTime(document.getElementById('master-vol').value, time, 0.01);

            g.gain.setValueAtTime(0, time);
            g.gain.linearRampToValueAtTime(1, time + a);
            g.gain.linearRampToValueAtTime(s, time + a + d);
            g.gain.setValueAtTime(s, time + dur);
            g.gain.exponentialRampToValueAtTime(0.001, time + dur + r);
        }

        // --- SEQUENCER ---
        let playing = false, step = 0, nextTime = 0, tid;
        function tick() {
            if(!playing) return;
            while(nextTime < ctx.currentTime + 0.1) {
                const bpm = document.getElementById('bpm').value;
                const stepDur = (60 / bpm) * 0.25;
                for(let n in gridState) if(gridState[n][step] > 0) playNote(n, nextTime, stepDur * gridState[n][step]);
                
                const currentStepUI = step;
                requestAnimationFrame(() => {
                    playhead.style.display = 'block';
                    // 70 sidebar + (paso * 36 ancho celda)
                    playhead.style.left = (70 + (currentStepUI * 36)) + 'px';
                });

                nextTime += stepDur;
                step = (step + 1) % loopSteps;
            }
            tid = setTimeout(tick, 25);
        }

        // --- MIDI ---
        function writeVarInt(value) {
            let buffer = [value & 0x7F];
            while (value > 0x7F) {
                value >>= 7;
                buffer.unshift((value & 0x7F) | 0x80);
            }
            return buffer;
        }

        function exportMIDI() {
            const ppq = 128;
            const ticksPerStep = 32; 
            let midi = [0x4D, 0x54, 0x68, 0x64, 0x00, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x01, 0x00, 0x80];
            let track = [];
            track.push(0x00, 0xFF, 0x51, 0x03, 0x07, 0xA1, 0x20);

            let events = [];
            for (let n in gridState) {
                for (let s = 0; s < loopSteps; s++) {
                    if (gridState[n][s] > 0) {
                        const startTick = s * ticksPerStep;
                        const endTick = startTick + (gridState[n][s] * ticksPerStep);
                        events.push({ tick: startTick, type: 0x90, note: parseInt(n), vel: 0x60 });
                        events.push({ tick: endTick, type: 0x80, note: parseInt(n), vel: 0x00 });
                    }
                }
            }
            events.sort((a, b) => a.tick - b.tick);

            let lastTick = 0;
            events.forEach(e => {
                let delta = e.tick - lastTick;
                track.push(...writeVarInt(delta));
                track.push(e.type, e.note, e.vel);
                lastTick = e.tick;
            });
            track.push(0x00, 0xFF, 0x2F, 0x00);

            let tlen = track.length;
            let th = [0x4D, 0x54, 0x72, 0x6B, (tlen >> 24) & 0xFF, (tlen >> 16) & 0xFF, (tlen >> 8) & 0xFF, tlen & 0xFF];
            const blob = new Blob([new Uint8Array([...midi, ...th, ...track])], {type: 'audio/midi'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'industrial_session.mid'; a.click();
        }

        document.getElementById('play').onclick = () => { initAudio(); if(playing) return; playing = true; step = 0; nextTime = ctx.currentTime; tick(); };
        document.getElementById('stop').onclick = () => { playing = false; clearTimeout(tid); playhead.style.display = 'none'; };
        document.getElementById('clear').onclick = () => { for(let n in gridState) { gridState[n].fill(0); refreshRow(n); } };
        document.getElementById('export').onclick = exportMIDI;

        document.getElementById('loop-select').onchange = (e) => {
            loopSteps = parseInt(e.target.value);
            for(let n in domCells) {
                for(let s=0; s<STEPS; s++) {
                    if(s >= loopSteps) domCells[n][s].classList.add('out-of-range');
                    else domCells[n][s].classList.remove('out-of-range');
                }
            }
        };

        document.querySelectorAll('.dur').forEach(b => b.onclick = (e) => {
            document.querySelectorAll('.dur').forEach(x => x.classList.remove('active'));
            e.target.classList.add('active');
            currentLen = parseInt(e.target.dataset.len);
        });

        document.getElementById('viewport').scrollTop = 450;
        document.getElementById('loop-select').dispatchEvent(new Event('change'));
    </script>
</body>
</html>
