<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Desarrollo Químico-Musical</title>
    <!-- Utilizando la versión más reciente y estable de abcjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js" type="text/javascript"></script>
    <style>
        :root {
            --sidebar-width: 320px;
            --primary: #2563eb;
            --bg: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #10b981; /* Verde esmeralda para play y resaltados */
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Sidebar - Listado */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--primary);
        }

        .strategy-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .strategy-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .strategy-item:hover {
            background: #f8fafc;
            transform: translateX(4px);
        }

        .strategy-item.active {
            background: #eff6ff;
            border-color: #bfdbfe;
            color: var(--primary);
            font-weight: 600;
        }

        .strategy-item span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-top: 4px;
        }

        /* Main Content - Sección de Foco */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            align-items: center;
        }

        .focus-panel {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        .focus-header {
            margin-bottom: 30px;
        }

        .focus-header h2 {
            font-size: 2rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .focus-description {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        #notation-area {
            background: #fff;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            justify-content: center;
        }

        /* Clases para animar las notas reproducidas generadas por JS */
        .abcjs-highlight {
            fill: var(--accent) !important;
            transition: fill 0.1s ease;
        }

        /* Reproductor Único */
        .player-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .player-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-play { background: var(--accent); color: white; }
        .btn-play:hover { background: #059669; transform: translateY(-1px); }
        .btn-play:active { transform: translateY(0); }
        
        .btn-stop { background: #ef4444; color: white; }
        .btn-stop:hover { background: #dc2626; transform: translateY(-1px); }
        .btn-stop:active { transform: translateY(0); }

        #audio-ui {
            width: 100%;
        }

        /* Ocultar elementos sobrantes del reproductor nativo */
        .abcjs-inline-audio {
            padding: 0 !important;
        }

        .abc-text-preview {
            margin-top: 30px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .strategy-list { max-height: 200px; }
            .main-content { padding: 20px; }
            .focus-panel { padding: 20px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>Estrategias Químicas</h1>
    </div>
    <div class="strategy-list" id="list">
        <!-- Generado dinámicamente -->
    </div>
</aside>

<main class="main-content">
    <div class="focus-panel" id="focus-panel">
        <div class="focus-header">
            <h2 id="focus-title">Cargando...</h2>
            <p class="focus-description" id="focus-desc"></p>
        </div>

        <div id="notation-area">
            <!-- Partitura ABC renderizada -->
        </div>

        <div class="player-controls" id="player-container">
            <div class="player-buttons">
                <button class="btn-play" id="play-btn">▶ Reproducir</button>
                <button class="btn-stop" id="stop-btn">⏹ Detener</button>
            </div>
            <!-- Contenedor del progreso de audio original de abcjs -->
            <div id="audio-ui"></div>
        </div>

        <div class="abc-text-preview" id="abc-source"></div>
    </div>
</main>

<script>
    // Datos Modulares
    const strategies = [
        {
            id: "orig",
            title: "Motivo Original",
            type: "Referencia",
            description: "La estructura atómica base (Do, Re, Mi, Sol) sobre la cual se aplicarán los procesos químicos de transformación.",
            abc: "X:1\nT:Motivo Original\nM:4/4\nL:1/4\nK:C\nC D E G |]"
        },
        {
            id: "sec",
            title: "Secuencia Diatónica",
            type: "Transposición",
            description: "Desplazamiento del motivo a través de los grados de la escala. Mantiene la relación interválica diatónica pero cambia las tensiones.",
            abc: "X:2\nT:Secuencia\nM:4/4\nL:1/4\nK:C\nD E F A |]"
        },
        {
            id: "inv",
            title: "Inversión",
            type: "Espejo",
            description: "Reflexión vertical de los intervalos. Los movimientos ascendentes se convierten en descendentes y viceversa.",
            abc: "X:3\nT:Inversión\nM:4/4\nL:1/4\nK:C\nC B, A, F, |]"
        },
        {
            id: "ret",
            title: "Retrogradación",
            type: "Cangrejo",
            description: "Lectura del motivo en sentido temporal inverso. Un proceso químico que invierte el orden cronológico de los eventos.",
            abc: "X:4\nT:Retrogradación\nM:4/4\nL:1/4\nK:C\nG E D C |]"
        },
        {
            id: "int",
            title: "Interpolación",
            type: "Adición",
            description: "Inserción de nuevas notas (catálisis) entre los nodos principales del motivo original para expandir su duración.",
            abc: "X:5\nT:Interpolación\nM:4/4\nL:1/8\nK:C\nC D E F G A G2 |]"
        },
        {
            id: "ext",
            title: "Extrapolación",
            type: "Extensión",
            description: "Proyección de la lógica del motivo hacia el exterior de sus límites iniciales, creando nuevas cadenas melódicas.",
            abc: "X:6\nT:Extrapolación\nM:4/4\nL:1/4\nK:C\nC D E G | A B c2 |]"
        },
        {
            id: "per",
            title: "Permutación",
            type: "Isomería",
            description: "Reordenamiento de los mismos elementos (notas) para crear una estructura distinta con la misma masa tonal.",
            abc: "X:7\nT:Permutación\nM:4/4\nL:1/4\nK:C\nG E C D |]"
        }
    ];

    let synthControl;
    let activeVisualObj;
    let loadedVisualObj = null;

    // Objeto para controlar el resaltado (color) de las notas mientras se reproducen
    const cursorControl = {
        onEvent: function(ev) {
            document.querySelectorAll(".abcjs-highlight").forEach(el => el.classList.remove("abcjs-highlight"));
            if (ev && ev.elements) {
                ev.elements.forEach(el => el[0].classList.add("abcjs-highlight"));
            }
        },
        onFinished: function() {
            document.querySelectorAll(".abcjs-highlight").forEach(el => el.classList.remove("abcjs-highlight"));
        }
    };

    // Inicialización
    window.onload = () => {
        renderList();
        setupPlayer();
        loadFocus(strategies[0].id);
    };

    function renderList() {
        const listContainer = document.getElementById('list');
        strategies.forEach(s => {
            const div = document.createElement('div');
            div.className = 'strategy-item';
            div.id = `item-${s.id}`;
            div.innerHTML = `
                ${s.title}
                <span>${s.type}</span>
            `;
            div.onclick = () => loadFocus(s.id);
            listContainer.appendChild(div);
        });
    }

    // Configuración única del controlador del sintetizador
    function setupPlayer() {
        if (!ABCJS.synth.supportsAudio()) {
            document.getElementById('player-container').innerHTML = "<p>Tu navegador no soporta el audio necesario para la reproducción.</p>";
            return;
        }

        // Se usa UNA sola instancia del SynthController para gestionar todo el audio
        synthControl = new ABCJS.synth.SynthController();
        synthControl.load("#audio-ui", cursorControl, {
            displayRestart: false,
            displayPlay: false, // Deshabilitamos el botón nativo, usaremos el nuestro
            displayProgress: true,
            displayWarp: false
        });

        // Evento botón de Play
        document.getElementById('play-btn').onclick = async () => {
            if (!activeVisualObj) return;

            try {
                // Si cambiamos de melodía o es la primera vez, bloqueamos con userAction=true
                // para evitar problemas con las políticas de Autoplay del navegador.
                if (loadedVisualObj !== activeVisualObj) {
                    await synthControl.setTune(activeVisualObj, true, { chordsOff: true });
                    loadedVisualObj = activeVisualObj;
                }
                
                // Empezar o resumir reproducción
                synthControl.play();
            } catch (error) {
                console.error("Error al iniciar reproducción:", error);
            }
        };

        // Evento botón de Detener
        document.getElementById('stop-btn').onclick = () => {
            if (synthControl) {
                synthControl.pause(); // Detenemos
                synthControl.seek(0); // Volvemos al inicio (comportamiento de "Stop")
                document.querySelectorAll(".abcjs-highlight").forEach(el => el.classList.remove("abcjs-highlight"));
            }
        };
    }

    // Cargar estrategia y renderizar partitura visual
    async function loadFocus(id) {
        const strategy = strategies.find(s => s.id === id);
        if (!strategy) return;

        // UI Updates
        document.querySelectorAll('.strategy-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');

        document.getElementById('focus-title').innerText = strategy.title;
        document.getElementById('focus-desc').innerText = strategy.description;
        document.getElementById('abc-source').innerText = strategy.abc;

        // Detener reproducción anterior
        if (synthControl) {
            synthControl.pause();
            synthControl.seek(0);
            document.querySelectorAll(".abcjs-highlight").forEach(el => el.classList.remove("abcjs-highlight"));
        }

        // Render Music (add_classes es clave para que el cursorControl detecte qué colorear)
        activeVisualObj = ABCJS.renderAbc("notation-area", strategy.abc, {
            responsive: 'resize',
            add_classes: true
        })[0];

        // Actualizar barra de progreso silenciosamente si es posible
        if (synthControl && loadedVisualObj !== null) {
            try {
                // Pre-cargamos para actualizar las medidas del UI de la barra de reproducción
                await synthControl.setTune(activeVisualObj, false);
                loadedVisualObj = activeVisualObj;
            } catch (e) {
                // Ignorar error aquí: significa que el usuario aún no interactuó (Contexto suspendido)
                loadedVisualObj = null; 
            }
        }
    }
</script>

</body>
</html>
