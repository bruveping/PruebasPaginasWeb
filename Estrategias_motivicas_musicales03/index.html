<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Desarrollo Motívico 🎹</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎹</text></svg>">
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Barra Lateral */
        aside {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .strategy-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .strategy-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .strategy-item:hover {
            background-color: #f0f7ff;
            color: var(--accent-color);
        }

        .strategy-item.active {
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        .strategy-item span.number {
            font-size: 0.75rem;
            opacity: 0.6;
            width: 25px;
            font-family: monospace;
        }

        /* Contenedor del Visor */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .viewer-controls {
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Estilos para el Navegador rápido */
        .quick-nav {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 6px;
        }

        input[type="number"] {
            width: 50px;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        select {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            max-width: 200px;
            outline: none;
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: white;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .btn:hover:not(:disabled) {
            background: #f8f9fa;
            border-color: var(--accent-color);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @media (max-width: 900px) {
            aside { display: none; }
            select { max-width: 150px; }
        }
    </style>
</head>
<body>

    <div class="layout">
        <!-- Navegador Lateral -->
        <aside>
            <div class="header">
                <h1><span>🎹</span> Desarrollo Motívico</h1>
            </div>
            <nav class="strategy-list" id="menu">
                <!-- Items dinámicos -->
            </nav>
        </aside>

        <!-- Contenido Principal -->
        <main>
            <div class="viewer-controls">
                <!-- Info e Input Numérico -->
                <div class="control-group">
                    <div class="quick-nav">
                        <label for="jumpTo">Índice:</label>
                        <input type="number" id="jumpTo" min="0" value="0">
                    </div>
                    <div id="current-info" style="font-size: 0.9rem; font-weight: 500;"></div>
                </div>

                <!-- Menú Desplegable y Navegación -->
                <div class="control-group">
                    <select id="dropdownMenu">
                        <!-- Opciones dinámicas -->
                    </select>
                    <div class="nav-buttons">
                        <button class="btn" id="prevBtn" title="Anterior (Flecha Izquierda)">←</button>
                        <button class="btn" id="nextBtn" title="Siguiente (Flecha Derecha)">→</button>
                    </div>
                </div>
            </div>
            
            <iframe id="viewer" name="viewer" src="about:blank"></iframe>
        </main>
    </div>

    <script>
        // Listado de archivos. 
        // TIP: Si usas el script de Python que te sugerí, este array se llenaría solo.
        const catalog = [
            { title: 'Motivo Original', file: 'original.html' },
            { title: 'Secuencia Diatónica', file: 'secuencia.html' },
            { title: 'Inversión (Espejo)', file: 'inversion.html' },
            { title: 'Retrogradación', file: 'retrogradacion.html' },
            { title: 'Interpolación', file: 'interpolacion.html' },
            { title: 'Extrapolación', file: 'extrapolacion.html' },
            { title: 'Permutación', file: 'permutacion.html' },
            { title: 'Aumentación Rítmica', file: 'aumentacion.html' },
            { title: 'Disminución Rítmica', file: 'disminucion.html' },
            { title: 'Fragmentación', file: 'fragmentacion.html' }
        ];

        let currentIndex = 0;
        
        // Elementos del DOM
        const menuEl = document.getElementById('menu');
        const dropdownEl = document.getElementById('dropdownMenu');
        const jumpInput = document.getElementById('jumpTo');
        const iframeEl = document.getElementById('viewer');
        const infoEl = document.getElementById('current-info');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Inicializar UI (Menú lateral y Dropdown)
        function initUI() {
            menuEl.innerHTML = '';
            dropdownEl.innerHTML = '';
            
            catalog.forEach((item, index) => {
                // 1. Llenar Menú Lateral
                const a = document.createElement('a');
                a.href = "#";
                a.className = "strategy-item";
                a.dataset.index = index;
                a.innerHTML = `<span class="number">${index}</span> <span>${item.title}</span>`;
                a.onclick = (e) => { e.preventDefault(); loadStrategy(index); };
                menuEl.appendChild(a);

                // 2. Llenar Dropdown
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = `${index}. ${item.title}`;
                dropdownEl.appendChild(opt);
            });

            jumpInput.max = catalog.length - 1;
        }

        // Función principal de carga
        function loadStrategy(index) {
            // Validar límites
            if (index < 0) index = 0;
            if (index >= catalog.length) index = catalog.length - 1;
            
            currentIndex = parseInt(index);
            const strategy = catalog[currentIndex];

            // 1. Actualizar Iframe
            iframeEl.src = strategy.file;

            // 2. Actualizar Info
            infoEl.textContent = strategy.title;

            // 3. Sincronizar Controles
            jumpInput.value = currentIndex;
            dropdownEl.value = currentIndex;

            // 4. Actualizar Menú Lateral (clase activa)
            document.querySelectorAll('.strategy-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentIndex);
                if (i === currentIndex) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            });

            // 5. Estado de botones
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === catalog.length - 1;
        }

        // EVENTOS

        // Cambio en Dropdown
        dropdownEl.onchange = (e) => loadStrategy(e.target.value);

        // Cambio en Input Numérico
        jumpInput.oninput = (e) => {
            const val = parseInt(e.target.value);
            if (!isNaN(val)) loadStrategy(val);
        };

        // Botones de navegación
        prevBtn.onclick = () => loadStrategy(currentIndex - 1);
        nextBtn.onclick = () => loadStrategy(currentIndex + 1);

        // Teclas rápidas
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; // Evitar disparar si escribes en el input
            if (e.key === "ArrowRight") loadStrategy(currentIndex + 1);
            if (e.key === "ArrowLeft") loadStrategy(currentIndex - 1);
        });

        // Arranque
        window.onload = () => {
            initUI();
            loadStrategy(0);
        };
    </script>
</body>
</html>
