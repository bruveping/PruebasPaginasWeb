<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>explorar_OSM_leaflet</title>
    
    <!-- Leaflet CSS (Open Source) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Tailwind CSS para una interfaz moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Estilo de la flecha de ubicación (Triángulo apuntando al Norte) */
        .location-arrow {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 28px solid #10b981; /* Verde Esmeralda */
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4));
            transition: transform 0.2s ease;
        }

        /* Controles flotantes esquina inferior derecha */
        .floating-controls {
            position: absolute;
            bottom: 25px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .btn-ui {
            width: 60px;
            height: 60px;
            background: white;
            border: none;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #374151;
        }

        .btn-ui:hover {
            background: #f3f4f6;
            transform: scale(1.05);
        }

        .btn-ui:active {
            transform: scale(0.95);
        }

        /* Panel de clima temporal */
        #weather-panel {
            position: absolute;
            bottom: 165px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            min-width: 180px;
            border: 1px solid #e5e7eb;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Quitar marca de agua de Leaflet para un look más limpio (opcional en Open Source) */
        .leaflet-control-attribution { font-size: 8px !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Panel de Clima (Se muestra 3 segundos) -->
    <div id="weather-panel">
        <div id="weather-content" class="text-center">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Clima Local</p>
            <div id="weather-details" class="flex flex-col items-center">
                <span class="text-3xl font-black text-gray-800" id="temp-val">--°</span>
                <span class="text-sm text-emerald-600 font-medium" id="condition-val">Cargando...</span>
            </div>
        </div>
    </div>

    <!-- Controles -->
    <div class="floating-controls">
        <!-- Botón Clima -->
        <button onclick="getWeatherInfo()" class="btn-ui" title="Info del Clima">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/><path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z"/></svg>
        </button>

        <!-- Botón Centrar -->
        <button onclick="centerOnUser()" class="btn-ui" title="Mi Ubicación">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map;
        let userMarker;
        let lastPos = null;

        function initMap() {
            // Inicializamos el mapa con OpenStreetMap (Capa gratuita y libre)
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Rastreo de ubicación en tiempo real
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        lastPos = [latitude, longitude];

                        if (!userMarker) {
                            // Crear el icono de flecha/triángulo
                            const arrowIcon = L.divIcon({
                                className: '',
                                html: '<div class="location-arrow"></div>',
                                iconSize: [24, 28],
                                iconAnchor: [12, 28]
                            });

                            userMarker = L.marker(lastPos, { icon: arrowIcon }).addTo(map);
                            // Solo centramos la primera vez que se detecta la ubicación
                            map.setView(lastPos, 14);
                        } else {
                            userMarker.setLatLng(lastPos);
                        }
                    },
                    (err) => console.error("Error de GPS: ", err),
                    { enableHighAccuracy: true }
                );
            }
        }

        // Función para centrar manualmente
        function centerOnUser() {
            if (lastPos) {
                map.flyTo(lastPos, 16, { animate: true, duration: 1.5 });
            } else {
                alert("Esperando señal de GPS...");
            }
        }

        // Función de clima (Open-Meteo API: Libre y sin Key)
        async function getWeatherInfo() {
            if (!lastPos) {
                alert("Ubicación no detectada.");
                return;
            }

            const panel = document.getElementById('weather-panel');
            const tempVal = document.getElementById('temp-val');
            const condVal = document.getElementById('condition-val');

            panel.style.display = 'block';
            tempVal.innerText = "...";
            condVal.innerText = "Sincronizando...";

            try {
                const lat = lastPos[0];
                const lon = lastPos[1];
                // API Open-Meteo: No requiere API Key, totalmente libre
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    tempVal.innerText = `${temp}°C`;
                    condVal.innerText = "Cielo despejado"; // Simplificado para esta versión libre
                }
            } catch (err) {
                tempVal.innerText = "Err";
                condVal.innerText = "Fallo de red";
            }

            // Ocultar automáticamente después de 3 segundos
            setTimeout(() => {
                panel.style.display = 'none';
            }, 3000);
        }

        window.onload = initMap;
    </script>
</body>
</html>
