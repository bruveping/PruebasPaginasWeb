<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armonía Studio - Fusión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark-scroll::-webkit-scrollbar-thumb { background: #475569; }
        .node-circle { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); fill: #1e293b; }
        .tension-line { fill: none; stroke-width: 2; stroke-dasharray: 8,4; stroke: #334155; opacity: 0.5; }
        .playing-node { stroke: #3b82f6 !important; stroke-width: 3px !important; fill: #2563eb !important; }
        .chord-card { transition: all 0.2s ease-in-out; cursor: pointer; }
        .chord-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #94a3b8; }
        .editor-input:focus { outline: none; box-shadow: none; }
        
        /* Asegurar que el input de búsqueda sea siempre clickable */
        #searchInput { pointer-events: auto !important; position: relative; z-index: 50; }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 text-slate-900">

    <!-- TOP: WORKSTATION -->
    <div class="h-[50vh] flex flex-col bg-slate-950 text-slate-100 shadow-2xl relative z-10 flex-shrink-0">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-800 bg-slate-950/80 backdrop-blur">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">Armonía Studio</h1>
                <div class="h-6 w-px bg-slate-700 mx-2"></div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Tonalidad:</span>
                    <div id="keySelector" class="flex bg-slate-900 rounded-lg p-1 border border-slate-800 overflow-x-auto dark-scroll"></div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="btnPlay" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
                    Reproducir
                </button>
                <button id="btnExportMidi" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Exportar MIDI
                </button>
                <button id="btnClear" class="p-2 text-slate-400 hover:text-red-400 transition-colors" title="Limpiar Editor">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>

        <div class="flex-1 relative flex flex-col">
            <div class="absolute top-0 left-0 w-full p-6 z-10 pointer-events-none">
                <input type="text" id="progInput" 
                    class="editor-input w-full bg-transparent border-none text-3xl font-bold mono-font text-white placeholder-slate-700 pointer-events-auto"
                    placeholder="Escribe acordes... ej: I IV V IIb7#11" autocomplete="off" spellcheck="false">
            </div>
            <div id="canvasContainer" class="flex-1 w-full h-full"></div>
        </div>
    </div>

    <!-- BOTTOM: CATALOG -->
    <div class="h-[50vh] flex flex-col bg-slate-50 relative z-30">
        <div class="px-6 py-4 border-b border-slate-200 bg-white sticky top-0 z-50 flex gap-4 items-center">
            <div class="relative flex-1">
                <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" placeholder="Buscar en base de datos 148..." 
                    class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-transparent rounded-lg text-sm focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all outline-none text-slate-900">
            </div>
            <div class="text-sm text-slate-500 font-medium whitespace-nowrap"><span id="resultsCount">0</span> progresiones</div>
        </div>
        <div id="cardsGrid" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 items-start content-start"></div>
    </div>

    <script>
        const KEYS = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
        const NOTE_NAMES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'G#', 'A', 'Bb', 'B'];
        let currentKey = 'C';
        let currentKeyIndex = 0;
        let dbProgressions = [];

        // --- D3 SETUP ---
        const width = window.innerWidth;
        const height = window.innerHeight * 0.5;
        const svg = d3.select("#canvasContainer").append("svg").attr("width", "100%").attr("height", "100%").attr("viewBox", `0 0 ${width} ${height}`);
        const gLines = svg.append("g");
        const gNodes = svg.append("g");

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        // --- PARSER ---
        function parseChord(romanStr, keyIdx) {
            let str = romanStr.trim();
            if(!str) return null;

            let rootOffset = 0;
            if (str.startsWith('b')) { rootOffset = -1; str = str.substring(1); }
            else if (str.startsWith('#')) { rootOffset = 1; str = str.substring(1); }

            const match = str.match(/^(VIII|III|VII|II|IV|VI|I|V)(.*)$/i);
            if (!match) return null;

            const romanBase = match[1];
            let suffix = match[2] || '';
            const isMinorBase = romanBase === romanBase.toLowerCase();

            if (suffix.startsWith('b') && !suffix.match(/^b[59]/) && !suffix.startsWith('b13')) {
                rootOffset -= 1;
                suffix = suffix.substring(1);
            } else if (suffix.startsWith('#') && !suffix.match(/^#[59]/) && !suffix.startsWith('#11')) {
                rootOffset += 1;
                suffix = suffix.substring(1);
            }

            const degreeMap = { 'i': 0, 'ii': 2, 'iii': 4, 'iv': 5, 'v': 7, 'vi': 9, 'vii': 11 };
            let baseDegreeValue = degreeMap[romanBase.toLowerCase()];
            if (baseDegreeValue === undefined) return null;

            let finalRootVal = (baseDegreeValue + rootOffset) % 12;
            if (finalRootVal < 0) finalRootVal += 12;
            let absoluteRoot = (keyIdx + finalRootVal) % 12;

            let intervals = (isMinorBase && !suffix.includes('maj')) ? [0, 3, 7] : [0, 4, 7];
            
            if (suffix.includes('dim')) intervals = [0, 3, 6];
            else if (suffix.includes('aug') || suffix.includes('+')) intervals = [0, 4, 8];
            else if (suffix.includes('m') && !suffix.includes('maj')) intervals = [0, 3, 7];

            if (suffix.includes('maj7') || suffix.includes('M7')) intervals.push(11);
            else if (suffix.includes('7')) {
                if (intervals[1] === 3 && intervals[2] === 6) intervals.push(suffix.includes('dim7') ? 9 : 10);
                else intervals.push(10);
            }

            if (suffix.includes('#11')) intervals.push(18);
            if (suffix.includes('b9')) intervals.push(13);
            else if (suffix.includes('9')) intervals.push(14);

            let midiNotes = intervals.map(iv => 60 + absoluteRoot + iv);
            midiNotes = midiNotes.map(n => n > 72 ? n - 12 : n);

            return {
                original: romanStr,
                rootNoteName: NOTE_NAMES[absoluteRoot],
                midiNotes: midiNotes.sort((a,b)=>a-b)
            };
        }

        function updateVisualizer() {
            const raw = document.getElementById('progInput').value;
            const chords = raw.split(/\s+/).filter(Boolean);
            const parsed = chords.map(c => parseChord(c, currentKeyIndex)).filter(Boolean);
            
            const nodeData = parsed.map((d, i) => {
                let xPos = width / 2;
                if (parsed.length > 1) {
                    const padding = 100;
                    xPos = padding + ((width - padding * 2) / (parsed.length - 1)) * i;
                }
                return { ...d, id: `n-${i}`, x: xPos, y: (height / 2) + Math.sin(i * 1.2) * 20 };
            });

            gLines.selectAll("path").data([nodeData]).join("path")
                .attr("class", "tension-line")
                .transition().duration(300)
                .attr("d", d3.line().x(d => d.x).y(d => d.y).curve(d3.curveMonotoneX));

            const nodes = gNodes.selectAll("g.chord-group").data(nodeData, d => d.id);
            const enter = nodes.enter().append("g").attr("class", "chord-group").attr("transform", d => `translate(${d.x}, ${d.y})`);

            enter.append("circle").attr("class", "node-circle").attr("r", 0).transition().duration(400).attr("r", 32);
            enter.append("text").attr("class", "mono-font text-sm font-bold").attr("text-anchor", "middle").attr("dy", ".3em").attr("fill", "#f8fafc").text(d => d.original);
            enter.append("text").attr("class", "mono-font text-[10px]").attr("text-anchor", "middle").attr("dy", "-3.8em").attr("fill", "#64748b").text(d => d.rootNoteName);

            nodes.transition().duration(300).attr("transform", d => `translate(${d.x}, ${d.y})`).select("text").text(d => d.original);
            nodes.exit().remove();
        }

        function playProgression() {
            initAudio();
            const chords = document.getElementById('progInput').value.split(/\s+/).filter(Boolean).map(c => parseChord(c, currentKeyIndex)).filter(Boolean);
            const duration = 2.0; 
            const start = audioCtx.currentTime + 0.1;

            chords.forEach((chord, i) => {
                const time = start + (i * duration);
                chord.midiNotes.forEach(note => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = 440 * Math.pow(2, (note - 69) / 12);
                    g.gain.setValueAtTime(0, time);
                    g.gain.linearRampToValueAtTime(0.2, time + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, time + duration);
                    osc.connect(g).connect(audioCtx.destination);
                    osc.start(time); osc.stop(time + duration);
                });
                setTimeout(() => {
                    d3.selectAll(".node-circle").classed("playing-node", false);
                    d3.select(gNodes.selectAll(".chord-group").nodes()[i]).select("circle").classed("playing-node", true);
                }, (time - audioCtx.currentTime) * 1000);
            });
            setTimeout(() => d3.selectAll(".node-circle").classed("playing-node", false), (chords.length * duration + 0.2) * 1000);
        }

        function writeVarLen(v) {
            let res = [v & 0x7F];
            while (v >>= 7) res.unshift((v & 0x7F) | 0x80);
            return res;
        }

        function exportMIDI() {
            const chords = document.getElementById('progInput').value.split(/\s+/).filter(Boolean).map(c => parseChord(c, currentKeyIndex)).filter(Boolean);
            if (!chords.length) return;

            const rootNames = chords.map(c => c.rootNoteName).join('_');
            const fileName = `Armonia_${currentKey}_(${rootNames}).mid`.replace(/[#]/g, 's');

            const header = [0x4d, 0x54, 0x68, 0x64, 0x00, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x01, 0x00, 0x80];
            let events = [0x00, 0xFF, 0x51, 0x03, 0x07, 0xA1, 0x20]; 
            chords.forEach(c => {
                c.midiNotes.forEach(n => events.push(0x00, 0x90, n, 0x60));
                c.midiNotes.forEach((n, j) => {
                    const delta = (j === 0) ? writeVarLen(512) : [0x00]; 
                    events.push(...delta, 0x80, n, 0x00);
                });
            });
            events.push(0x00, 0xFF, 0x2F, 0x00);
            const mtrk = [0x4d, 0x54, 0x72, 0x6b, ...[(events.length >> 24) & 0xFF, (events.length >> 16) & 0xFF, (events.length >> 8) & 0xFF, events.length & 0xFF], ...events];
            const blob = new Blob([new Uint8Array([...header, ...mtrk])], { type: 'audio/midi' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fileName; a.click();
        }

        // --- RENDERIZADO DE TARJETAS ---
        function renderCards(data) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            document.getElementById('resultsCount').textContent = data.length;
            
            data.forEach(item => {
                const d = document.createElement('div');
                const progText = item.progression || item.p || "";
                d.className = "chord-card bg-white border border-slate-200 rounded-xl p-5 flex flex-col";
                d.innerHTML = `
                    <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded uppercase self-start">${item.mode || 'Jónico'}</span>
                    <h3 class="text-xl font-black text-slate-800 mono-font my-2">${progText}</h3>
                    <p class="text-xs text-slate-400">${item.type || 'Progresión'}</p>
                `;
                d.onclick = () => { 
                    const inp = document.getElementById('progInput'); 
                    inp.value = inp.value ? inp.value + ' ' + progText : progText; 
                    updateVisualizer(); 
                };
                grid.appendChild(d);
            });
        }

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            const ks = document.getElementById('keySelector');
            KEYS.forEach((k, i) => {
                const b = document.createElement('button');
                b.textContent = k;
                b.className = `min-w-[42px] py-1.5 text-xs font-bold rounded border ${k === currentKey ? 'bg-blue-600 text-white' : 'text-slate-400 border-transparent hover:bg-slate-800'}`;
                b.onclick = () => { 
                    currentKey = k; 
                    currentKeyIndex = i; 
                    Array.from(ks.children).forEach(btn => btn.className = btn.textContent === k ? 'min-w-[42px] py-1.5 text-xs font-bold rounded border bg-blue-600 text-white' : 'min-w-[42px] py-1.5 text-xs font-bold rounded border text-slate-400 border-transparent hover:bg-slate-800'); 
                    updateVisualizer(); 
                };
                ks.appendChild(b);
            });

            // Carga de JSON
            fetch('progresionesMayoresMenores148.json')
                .then(r => r.json())
                .then(data => {
                    dbProgressions = data; 
                    renderCards(dbProgressions);
                })
                .catch(() => { 
                    document.getElementById('cardsGrid').innerHTML = "<p class='col-span-full text-slate-400 text-center py-10'>Archivo JSON no detectado.</p>"; 
                });

            // Eventos del buscador
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = dbProgressions.filter(item => {
                    const p = (item.progression || item.p || "").toLowerCase();
                    const m = (item.mode || "").toLowerCase();
                    const t = (item.type || "").toLowerCase();
                    return p.includes(query) || m.includes(query) || t.includes(query);
                });
                renderCards(filtered);
            });

            document.getElementById('progInput').oninput = updateVisualizer;
            document.getElementById('btnPlay').onclick = playProgression;
            document.getElementById('btnExportMidi').onclick = exportMIDI;
            document.getElementById('btnClear').onclick = () => { document.getElementById('progInput').value = ''; updateVisualizer(); };
        });
    </script>
</body>
</html>
